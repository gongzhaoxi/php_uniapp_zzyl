{extend name="base" /}
{block name="body"}
    <form class="layui-form" action="" method="post">
        <div class="mainBox">
            <div class="main-container">
                <div class="layui-form-item">
                    <label class="layui-form-label">文章标题</label>
                    <div class="layui-input-block">
                        <input type="text" maxlength="255" name="title" lay-verify="required" placeholder="请输入文章标题" autocomplete="off" class="layui-input">
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">文章分类</label>
                    <div class="layui-input-block">
						<select name="cid" lay-verify="required">
							{foreach $category as $vo}
							<option value="{$vo['id']}">{$vo['name']}</option>
							{/foreach}
						</select>
                    </div>
                </div>				
				<div class="layui-form-item">
                    <label class="layui-form-label">简介</label>
                    <div class="layui-input-block">
						<textarea name="desc" class="layui-textarea"></textarea>
                    </div>
                </div>				
				<div class="layui-form-item">
					<label class="layui-form-label">文章封面</label>
					<div class="layui-input-block">
						{:$form->optPhoto('image')}
					</div>
				</div>
                <div class="layui-form-item">
                    <label class="layui-form-label">作者</label>
                    <div class="layui-input-block">
                        <input type="text" maxlength="255" name="author"  placeholder="" autocomplete="off" class="layui-input">
                    </div>
                </div>				
				<div class="layui-form-item">
					<label class="layui-form-label">排序</label>
					<div class="layui-input-inline">
						<input type="number" max="99999" name="sort" value="0" lay-verify="required|number" min="0" placeholder="请输入排序" autocomplete="off" class="layui-input">
					</div>
					<div class="layui-form-mid layui-word-aux">数值越大越排前</div>
				</div>	
                <div class="layui-form-item">
                    <label class="layui-form-label">初始浏览量</label>
                    <div class="layui-input-inline">
                        <input type="number" max="100000000" name="click_virtual" value="0" lay-verify="required|number" min="0" placeholder="" autocomplete="off" class="layui-input">
                    </div>
					<div class="layui-form-mid layui-word-aux">点击量=初始浏览量+实际浏览量</div>
                </div>				
				<div class="layui-form-item">
					<label class="layui-form-label">状态</label>
					<div class="layui-input-block">
						<input type="radio" name="status" value="0" title="隐藏">
						<input type="radio" name="status" value="1" title="显示" checked>
					</div>
				</div>
                <div class="layui-form-item">
                    <label class="layui-form-label">文章内容</label>
                    <div class="layui-input-block">
                       {:$form->tinymce('content')}
                    </div>
                </div>
            </div>
        </div>
        <div class="bottom">
			<div class="button-container">
				<button type="submit" class="layui-btn layui-btn-normal layui-btn-sm" lay-submit="" lay-filter="*"><i class="layui-icon layui-icon-ok"></i>提交</button>
				<button type="reset" class="layui-btn layui-btn-primary layui-btn-sm"><i class="layui-icon layui-icon-refresh"></i>重置</button>
			</div>
		</div>
	</form>
{/block}
