{extend name="base" /}
{block name="body"}
<div class="layui-card">
	<div class="layui-card-body">
		<form class="layui-form" action="" id="searchForm">
			<div class="layui-form-item">
				<div class="layui-form-item layui-inline">
					<input type="text" name="keyword" placeholder="姓名/职称/手机号码" class="layui-input">
				</div>
				<div class="layui-form-item layui-inline">
					<button class="pear-btn pear-btn-md pear-btn-primary" lay-submit lay-filter="query"><i class="layui-icon layui-icon-search"></i>查询</button>
					<button type="reset" class="pear-btn pear-btn-md"><i class="layui-icon layui-icon-refresh"></i>重置</button>
				</div>
			</div>
		</form>
	</div>
</div>
<div class="layui-card">
	<div class="layui-card-body">
		<table id="dataTable" lay-filter="dataTable"></table>
	</div>
</div>
<script type="text/html" id="toolbar">
	<button class="pear-btn pear-btn-primary pear-btn-sm" lay-event="add"><i class="layui-icon layui-icon-add-1"></i>新增</button>
	<button class="pear-btn pear-btn-danger pear-btn-sm" lay-event="batchRemove"><i class="layui-icon layui-icon-delete"></i>删除</button>
	<button class="pear-btn pear-btn-success pear-btn-sm" lay-event="export"><i class="layui-icon layui-icon-download-circle"></i>导出</button>
	<button class="pear-btn pear-btn-sm" lay-event="recycle"><i class="layui-icon  layui-icon-close-fill"></i>回收站</button>
</script>
<script type="text/html" id="options">
	<button class="pear-btn pear-btn-primary pear-btn-xs" lay-event="edit"><i class="layui-icon layui-icon-edit"></i></button>
	<button class="pear-btn pear-btn-danger pear-btn-xs" lay-event="remove"><i class="layui-icon layui-icon-delete"></i></button>
</script>
{/block}
{block name="script"}
<script>
	layui.use(['table', 'form', 'jquery','common'], function() {
		let table = layui.table;
		let form = layui.form;
		let $ = layui.jquery;

		table.render({
			elem: '#dataTable',
			url: '{:url('list')}',
			page: true,
			limit:90,
			height:'full-170',
			cols: [[
				{type: 'checkbox'},
				{field: 'id',title: 'ID', sort: true, align: 'center',unresize: true, hide: getTableFieldIsHide('dataTable','id')},
				{field: 'name',title: '姓名',align: 'center',unresize: true, hide: getTableFieldIsHide('dataTable','name')},
				{field: 'title',title: '职称',align: 'center',unresize: true, hide: getTableFieldIsHide('dataTable','title')},
				{field: 'mobile',title: '手机',align: 'center',unresize: true, hide: getTableFieldIsHide('dataTable','mobile')},
				{field: 'sn',title: '手机端身份识别码',align: 'center',unresize: true, hide: getTableFieldIsHide('dataTable','sn')},
				{field: 'status_desc',title: '状态',align: 'center',unresize: true, hide: getTableFieldIsHide('dataTable','status_desc')},
				{field: 'create_time',title: '添加时间',unresize: true,align: 'center', hide: getTableFieldIsHide('dataTable','create_time')}, 
				{title: '操作',toolbar: '#options',align: 'center',unresize: true,width: 200}
			]],
			cellMinWidth: 100,

			toolbar: '#toolbar',
			defaultToolbar: [{
				title: '刷新',
				layEvent: 'refresh',
				icon: 'layui-icon-refresh',
			}, 'filter', 'print', 'exports']
		});

		table.on('sort(dataTable)', function(obj){
			table.reload('dataTable', {
				initSort: obj,
				where: {
					sort: obj.field,
					order: obj.type
				}
			},true);
		});

		table.on('tool(dataTable)', function(obj) {
			if (obj.event === 'remove') {
				layerConfirm('确定要删除该员工?','{:url('remove')}',{ids:[obj.data['id']]},function(res){
					obj.del();
				})
			} else if (obj.event === 'edit') {
				openLayer('修改员工','{:url('edit')}?id='+obj.data['id'],'80%','90%');
			}
		});

		table.on('toolbar(dataTable)', function(obj) {
			if (obj.event === 'add') {
				openLayer('新增员工','{:url('add')}','80%','90%');
			}else if (obj.event === 'refresh') {
				table.reload('dataTable');
			} else if (obj.event === 'batchRemove') {
				tableAction(obj.config.id,'确定要删除这些员工','{:url('remove')}');
			} else if (obj.event === 'recycle') {
				openLayer('回收站','{:url('recycle')}','90%','90%',function () {
					table.reload('dataTable');
				});
			}else if (obj.event === 'export') {
				var index = layui.layer.load(1);
				let column 	= [{text:'姓名',key:'name'},{text:'职称',key:'title'},{text:'手机',key:'mobile'},{text:'手机端身份识别码',key:'sn'},{text:'状态',key:'status_desc'},{text:'添加时间',key:'create_time'}];
				$.ajax({
					type : "get",
					url : "{:url('list')}?limit=100000",
					data: $('#searchForm').serialize(),
					success : function(data) {
						layui.layer.close(index);
						if (data.count > 0) {
							jsonToExcel(column, [column], data.data, '车间员工')
						}else{
							layui.layer.msg('暂无数据');
						}
					}
				});
			}
		});
		table.on('colToggled(dataTable)', function(obj){
			setTableFieldIsHide(obj.config.id,obj.col.field,obj.col.hide);
		});

		form.on('submit(query)', function(data) {
			table.reload('dataTable', {
				where: data.field,
				page:{curr: 1}
			})
			return false;
		});
	})
</script>
{/block}
