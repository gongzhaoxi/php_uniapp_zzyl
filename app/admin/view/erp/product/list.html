{block name="script"}
<script>
	var bill_type = {:json_encode($bill_type)} ;
	
	layui.use(['table', 'form', 'jquery','common'], function() {
		let table = layui.table;
		let form = layui.form;
		let $ = layui.jquery;
		let product_id;
		let project_id = 0;

		var h = ($(window).height() - 553)-2 ;
		if(h<=250){
			h= 250;
		}
	
		table.render({
			elem: '#dataTable',
			url: '{:url('list')}',
			limit:90,
			page: true,		
			cols: [[
				{field: 'sn',title: '产品编码',sort: true,align: 'center',unresize: false,width:{:get_col_width('sn')}, hide: getTableFieldIsHide('dataTable','sn')},
				{field: 'name',title: '产品名称',sort: true,align: 'left',unresize: false,width:{:get_col_width('name')}, hide: getTableFieldIsHide('dataTable','name')},
				{field: 'model',title: '型号',sort: true,align: 'center',unresize: false,width: {:get_col_width('model',100)}, hide: getTableFieldIsHide('dataTable','model')},
				{field: 'specs',title: '款式',sort: true,align: 'center',unresize: false,width: {:get_col_width('specs',100)}, hide: getTableFieldIsHide('dataTable','specs')},
				{field: 'remark',title: '备注',sort: true,align: 'left',unresize: false,width: {:get_col_width('remark',100)}, hide: getTableFieldIsHide('dataTable','remark')},
				{field: 'status_desc',title: '状态',align: 'center',unresize: false,width: {:get_col_width('status_desc',100)},templet: function(d){return '<span '+(d.status==0?'style="color:red;"':'')+'>'+d.status_desc+'</span>';}, hide: getTableFieldIsHide('dataTable','status_desc')},
				{title: '操作',toolbar: '#options',align: 'center',unresize: true,width: 80,fixed: 'right'}
			]],
			cellMinWidth: 100,
			height: h,
			//skin: 'line',
			toolbar: '#toolbar',
			defaultToolbar: [{
				title: '刷新',
				layEvent: 'refresh',
				icon: 'layui-icon-refresh',
			}, 'filter']
		});

		table.on('sort(dataTable)', function(obj){
			table.reload('dataTable', {
				initSort: obj,
				where: {
					sort: obj.field,
					order: obj.type
				}
			},true);
		});

		table.on('tool(dataTable)', function(obj) {
			if (obj.event === 'remove') {
				layerConfirm('确定要删除该产品?','{:url('remove')}',{ids:[obj.data['id']]},function(res){
					obj.del();
				})
			} else if (obj.event === 'edit') {
				openLayer('修改产品','{:url('edit')}?id='+obj.data['id'],'80%','90%');
			} else if (obj.event === 'photo') {
				layerPhotos(obj.data['photo_link'],obj.data['id'])
			}else if (obj.event === 'copy') {
				layerConfirm('确定要复制该产品?','{:url('copy')}',{id:obj.data['id']},function(res){
					table.reload('dataTable');
				})
			}
		});

		table.on('toolbar(dataTable)', function(obj) {
			if (obj.event === 'add') {
				openLayer('新增产品','{:url('add')}','80%','90%');
			}else if (obj.event === 'refresh') {
				table.reload('dataTable');
			} else if (obj.event === 'batchRemove') {
				tableAction(obj.config.id,'确定要删除这些产品','{:url('remove')}');
			} else if (obj.event === 'import') {
				openLayer('导入','{:url('import')}','80%','90%',function () {
					table.reload('dataTable');
				});
			}
		});

		form.on('submit(query)', function(data) {
			table.reload('dataTable', {
				where: data.field,
				page:{curr: 1}
			})
			return false;
		});
		
		form.on('submit(queryProject)', function(data) {
			table.reload('projectTable', {
				where: data.field,
				page:{curr: 1}
			})
			return false;
		});		
		
		form.on('submit(queryBom1)', function(data) {
			table.reload('bom1Table', {
				where: data.field,
				page:{curr: 1}
			})
			return false;
		});			
		
		form.on('submit(queryBom2)', function(data) {
			table.reload('bom2Table', {
				where: data.field,
				page:{curr: 1}
			})
			return false;
		});			
		
		form.on('submit(queryBom3)', function(data) {
			table.reload('bom3Table', {
				where: data.field,
				page:{curr: 1}
			})
			return false;
		});	

		form.on('submit(queryBom4)', function(data) {
			table.reload('bom4Table', {
				where: data.field,
				page:{curr: 1}
			})
			return false;
		});			
		
		form.on('submit(queryBom5)', function(data) {
			table.reload('bom5Table', {
				where: data.field,
				page:{curr: 1}
			})
			return false;
		});			
		
		table.on('row(dataTable)',function (obj) {
			$(".empty").hide();
			$(".type").hide();
			$('.type0').show();
			product_id = obj.data['id'];
			window.renderData0()
			window.renderData1()
			window.renderData2()
		})		
		
		window.renderData0 = function() {
			table.render({
				elem: '#projectTable',
				url: "{:url('erp.ProductProject/list')}?product_id="+product_id,
				page: true,
				limit:90,
				height: h,
				cols: [[
					{type: 'checkbox'},
					{field: 'code',title: '方案编号',sort: true,align: 'center',unresize: false,width: {:get_col_width('code0',150)}, hide: getTableFieldIsHide('projectTable','code')},
					{field: 'name',title: '方案名称',sort: true,align: 'left',unresize: false,width: {:get_col_width('name0',250)}, hide: getTableFieldIsHide('projectTable','name')},
					{field: 'is_default_desc',title: '默认配置',align: 'center',unresize: true,width: 100, hide: getTableFieldIsHide('projectTable','is_default_desc')},
					{field: 'category',title: '方案分类',sort: true, align: 'center',unresize: false,width: {:get_col_width('category0',120)}, hide: getTableFieldIsHide('projectTable','category')},
					{field: 'type_desc',title: '方案功能',sort: true,align: 'center',unresize: false,width: {:get_col_width('type_desc0',100)}, hide: getTableFieldIsHide('projectTable','type_desc')},
					{field: 'status_desc',title: '状态',align: 'center',unresize: false,width: {:get_col_width('status_desc0',100)}, hide: getTableFieldIsHide('projectTable','status_desc')},
					{title: '操作',toolbar: '#options',align: 'center',unresize: true,width: 100,fixed: 'right'}
				]],
				toolbar: '#projectToolbar',
				defaultToolbar: [{
					title: '刷新',
					layEvent: 'refresh',
					icon: 'layui-icon-refresh',
				}, 'filter'],
				done:function(res, curr, count){
					form.render('select'); 
				}
			});
		}		
		table.on('tool(projectTable)', function(obj) {
			if (obj.event === 'remove') {
				layerConfirm('确定要删除该方案?','{:url('erp.ProductProject/remove')}',{ids:[obj.data['id']]},function(res){
					obj.del();
				})
			} else if (obj.event === 'edit') {
				openLayer('修改方案','{:url('erp.ProductProject/edit')}?id='+obj.data['id'],'80%','90%');
			}else if (obj.event === 'copy') {
				layerConfirm('确定要复制该方案?','{:url('erp.ProductProject/copy')}',{id:obj.data['id']},function(res){
					table.reload('projectTable');
				})
			}
		});

		table.on('toolbar(projectTable)', function(obj) {
			if (obj.event === 'add') {
				openLayer('新增方案',"{:url('erp.ProductProject/add')}?product_id="+product_id,'80%','90%');
			}else if (obj.event === 'refresh') {
				table.reload('projectTable');
			} else if (obj.event === 'batchRemove') {
				tableAction(obj.config.id,'确定要删除这些方案','{:url('erp.ProductProject/remove')}');
			}else if (obj.event === 'import') {
				openLayer('导入','{:url('erp.ProductProject/import')}','80%','90%',function () {
					table.reload('projectTable');
				});
			}
		});	
		table.on('row(projectTable)',function (obj) {
			$(".type").hide();
			$('.type'+obj.data['type']).show();
			project_id = obj.data['id'];
			if(obj.data['type'] == 1){
				window.renderData3()
				window.renderData4()
			}else{
				window.renderData5()
			}
		})			
		
	
		window.renderData1 = function() {
			table.render({
				elem: '#bom1Table',
				url: "{:url('erp.ProductBom/list')}?project_id=0&data_type=1&product_id="+product_id,
				page: true,
				limit:90,
				height: h,
				cols: [[

		function getBillTypeSelect(d){
			var html ='';
			if(d.project_bom_id == 0){
				html = '<select lay-filter="bill_type" data-id="'+d.id+'" name="bill_type"  lay-skin="select"><option value="0" >无</option>'; 
				layui.each(bill_type, function(index, item){
					html += '<option value="'+item.id+'" '+(d.bill_type==item.id ? 'selected':'')+'>'+item.name+'</option>';
				});
				html += '</select>';
			}else{
				layui.each(bill_type, function(index, item){
					if(d.bill_type==item.id){
						html += item.name;
					}
				});
			}
			return html;
		}
