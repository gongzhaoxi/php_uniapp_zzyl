{extend name="base" /}
{block name="body"}
<style>
.layui-input-block {margin-left: 150px;}
.layui-form-label {width: 120px;}
.item .layui-row{background: rgb(242, 242, 242);padding:20px;}
.item .layui-row .layui-form-label{width: 60px;}
.item .layui-row .layui-input-block {margin-left: 90px;}
.item .layui-row .layui-form-item {margin-bottom: 10px !important;margin-top: 0px !important;}
</style>
    <form class="layui-form" action="" method="post">
        <div class="mainBox">
            <div class="main-container">
				<blockquote class="layui-elem-quote">基本信息</blockquote>
				<div class="layui-form-item">
					<label class="layui-form-label">随工单用途分类</label>
                    <div class="layui-input-inline">
                       <select name="cid">
						{volist name="category" id="vo"}
						<option value="{$vo['id']}">{$vo['name']}</option>
						{/volist}
					   </select>
                    </div>
					<label class="layui-form-label">随工单编码</label>
                    <div class="layui-input-inline">
                        <input type="text" maxlength="255" name="code" value="" placeholder="请输入,不可为空" lay-verify="required" autocomplete="off" class="layui-input">
                    </div>
					<label class="layui-form-label">随工单名称</label>
                    <div class="layui-input-inline">
                        <input type="text"  maxlength="255" name="name" value="" placeholder="请输入,不可为空"  lay-verify="required" autocomplete="off"  class="layui-input">
                    </div>
                </div>				             
				<div class="layui-form-item">
                    <label class="layui-form-label">ISO文件档案号</label>
                    <div class="layui-input-inline">
                        <input type="text" maxlength="255" name="iso"  value="" placeholder="请输入,不可为空" lay-verify="required" autocomplete="off" class="layui-input">
                    </div>
                    <label class="layui-form-label">地址</label>
                    <div class="layui-input-inline">
                        <input type="text" maxlength="255" name="address"  value="" placeholder="请输入,不可为空" lay-verify="required" autocomplete="off" class="layui-input">
                    </div>	
                    <label class="layui-form-label">生产依据</label>
                    <div class="layui-input-inline">
                        <input type="text" maxlength="255" name="according"  value="" placeholder="可为空" autocomplete="off" class="layui-input">
                    </div>					
                </div>
				<div class="layui-form-item">
                    <label class="layui-form-label">备注</label>
                    <div class="layui-input-block">
                        <input type="text" maxlength="255" name="remark"  value="" placeholder="可为空" autocomplete="off" class="layui-input">
                    </div>
                </div>				
				<div class="layui-form-item">
					<label class="layui-form-label">状态</label>
					<div class="layui-input-block">
						<input type="radio" name="status" value="1" title="启用" checked>
						<input type="radio" name="status" value="0" title="禁用" >
					</div>
				</div>
				<blockquote class="layui-elem-quote">产品名称<button type="button" style="float:right;"  class="layui-btn layui-btn-normal layui-btn-sm add-product">添加</button></blockquote>
				<div id="productDiv" class="layui-row layui-col-space30 "></div>
				<div style="clear:both;height:10px;"></div>
				<blockquote class="layui-elem-quote">工序要求<button type="button" style="float:right;"  class="layui-btn layui-btn-normal layui-btn-sm add-process">添加</button></blockquote>
				<div id="processDiv" class="layui-row layui-col-space30 "></div>
            </div>
        </div>
        <div class="bottom">
			<div class="button-container">
				<button type="submit" class="layui-btn layui-btn-normal layui-btn-sm" lay-submit="" lay-filter="*">
					<i class="layui-icon layui-icon-ok"></i>
					提交
				</button>
				<button type="reset" class="layui-btn layui-btn-primary layui-btn-sm">
					<i class="layui-icon layui-icon-refresh"></i>
					重置
				</button>
			</div>
		</div>
	</form>
{/block}
{block name="script"}
<script>
var product_key = 0;
var process_key = 0;
layui.use(['form', 'jquery'], function() {
	let form = layui.form;
	let $ = layui.jquery;

	$('.add-product').click(function(){
		$('#productDiv').append(getHtml('product',product_key));
		product_key++;
		form.render();
	})
	
	$('.add-process').click(function(){
		$('#processDiv').append(getHtml('process',process_key));
		process_key++;
		form.render();
	})	
	
	$("body").on("click",".layui-icon-delete",function(){
		var obj = this;
		layer.confirm('确认删除？', function(){
			$(obj).closest(".item").remove();
			layer.closeAll();
		});
	});	
	
	function getHtml(key,index){
		var html = '<div class="layui-col-md6 item">';						
		html += '		<div class="layui-row">';	
		html += '						<div class="layui-col-md2">';									
		html += '							<button type="button" data-name="'+key+'['+index+'][image]" data-type="radio" data-url="/admin/index/optPhoto.html?file_type=image&type=radio" class="pear-btn pear-btn-primary  opt_photo">图库选择</button>';	
		html += '							<div class="photos">';
		html += '								<ul class="priview">';
		html += '									<li class="item_img"><img onclick="window.top.layerPhotos(this)" src="" data-href="" class="img">';
		html += '									<input type="hidden" name="'+key+'['+index+'][image]" value=""></li>';
		html += '								</ul>';
		html += '							</div>';																
		html += '						</div>';
		html += '						<div class="layui-col-md9">	';									
		html += '							<div class="layui-form-item">';
		html += '								<label class="layui-form-label">显示标题</label>';
		html += '								<div class="layui-input-block">';
		html += '									<input type="text" maxlength="255" name="'+key+'['+index+'][title]" value="" lay-verify="required" placeholder="不可为空" autocomplete="off" class="layui-input">';
		html += '								</div>';
		html += '							</div>	';									
		html += '							<div class="layui-form-item">';
		html += '								<label class="layui-form-label">类型</label>';
		html += '								<div class="layui-input-block">';
		html += '									<input type="radio" name="'+key+'['+index+'][is_num]" value="0" title="不带编号组件" checked >';
		html += '									<input type="radio" name="'+key+'['+index+'][is_num]" value="1" title="带编号组件" >';
		html += '								</div>';
		html += '							</div>	';	
		html += '							<div class="layui-form-item">';
		html += '								<label class="layui-form-label">默认选中</label>';
		html += '								<div class="layui-input-block">';
		html += '									<input type="radio" name="'+key+'['+index+'][checked]" value="0" title="否" checked >';
		html += '									<input type="radio" name="'+key+'['+index+'][checked]" value="1" title="是" >';		
		html += '								</div>';
		html += '							</div>	';		
		html += '						</div>';

		html += '						<div class="layui-col-md1" style="text-align:right;">';
		html += '							<i class="layui-icon layui-icon-delete"></i>';
		html += '						</div>';
		html += '					</div>';
		html += '				</div>';
		return html;
	}
})
</script>
{/block}
