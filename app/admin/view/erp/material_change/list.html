{extend name="base" /}
{block name="body"}
<style>
#searchForm .layui-inline{width:150px;}
</style>
<div class="layui-card">
	<div class="layui-card-body">
		<div class="layui-tab layui-tab-brief">
			<ul class="layui-tab-title">
				<a href="{:url('list')}?material_type=1"><li class="{if $material_type == 1}layui-this{/if}">零件进出帐</li></a>
				<a href="{:url('list')}?material_type=2"><li class="{if $material_type == 2}layui-this{/if}">组件进出帐</li></a>
			</ul>
		</div>	
	</div>
</div>
<div class="layui-card">
	<div class="layui-card-body">
		<div class="layui-row">
			<div class="layui-col-md2">
				<ul id="demoTree" class="dtree" ></ul>
			</div>
			<div class="layui-col-md10">
				<form class="layui-form" action="" id="searchForm">
					<div class="layui-form-item layui-inline" style="width: 200px;">
						<input type="text" name="keyword" placeholder="单据编号/物料编码/名称" class="layui-input">					
					</div>		
					<div class="layui-form-item layui-inline">
						<select name="data_type">
							<option value="">类别</option>
							{foreach $data_type as $key=>$vo}
							<option value="{$key}" >{$vo}</option>
							{/foreach}
						</select>
					</div>	
					<div class="layui-form-item layui-inline">
						<select name="type">
							<option value="">进/出类型</option>
							<optgroup label="入库">
							{foreach $enter_type as $key=>$vo}
							<option value="{$key}" >{$vo}</option>
							{/foreach}
							</optgroup>
							<optgroup label="出库">
							{foreach $out_type as $key=>$vo}
							<option value="{$key}" >{$vo}</option>
							{/foreach}							
							</optgroup>	
							<optgroup label="报废">
							{foreach $discard_type as $key=>$vo}
							<option value="{$key}" >{$vo}</option>
							{/foreach}							
							</optgroup>	
						</select>
					</div>
					<div class="layui-form-item layui-inline" style="width:190px;">
						<input type="text" name="department" placeholder="领料部门" class="layui-input">	
					</div>					
					<div class="layui-form-item layui-inline" style="width:190px;">
						<input type="text" name="stock_date" placeholder="选择进/出日期" class="layui-input rangedate">	
					</div>
					<div class="layui-form-item layui-inline">
						<select name="stock_create_admin">
							<option value="">单据创建人</option>
							{foreach $stock_create_admin as $key=>$vo}
							<option value="{$vo['create_admin']}" >{$vo['create_admin']}</option>
							{/foreach}
						</select>
					</div>				
					<div class="layui-form-item layui-inline">
						<select name="create_admin">
							<option value="">审核人</option>
							{foreach $create_admin as $key=>$vo}
							<option value="{$vo['create_admin']}" >{$vo['create_admin']}</option>
							{/foreach}
						</select>
					</div>				
					<div class="layui-form-item layui-inline">
						<button class="pear-btn pear-btn-md pear-btn-primary" lay-submit lay-filter="query"><i class="layui-icon layui-icon-search"></i>查询</button>
						<button type="reset" class="pear-btn pear-btn-md"><i class="layui-icon layui-icon-refresh"></i>重置</button>
					</div>
				</form>		
				<table id="dataTable" lay-filter="dataTable"></table>
			</div>
		</div>
	</div>
</div>
<script type="text/html" id="toolbar">
	<button class="pear-btn pear-btn-primary pear-btn-sm" lay-event="export"><i class="layui-icon layui-icon-download-circle"></i>导出</button>
</script>
<script type="text/html" id="photo">
{{#  if(d.final_pic && d.final_pic.length > 0){ }}
<a onclick="layerPhotos('{{d.final_pic.join(',')}}','{{ d.id }}')" href="javascript:;"><img src="{{ d.final_pic[0] }}" /> </a>
{{#  } }}
</script>
{/block}
{block name="script"}
<script>
	layui.use(['table', 'form', 'jquery','common','dtree'], function() {
		let table = layui.table;
		let form = layui.form;
		let $ = layui.jquery;
		var dtree = layui.dtree;
		var tree_id = '';

		var demoTree = dtree.render({
			elem: "#demoTree",
			data:{:json_encode($tree)},
			menubar:true,
			//skin: "laySimple",  // layui主题风格
			//icon: "-1",  // 隐藏二级图标
			line: true,  // 显示树线
			response:{
				treeId: "id",			  //节点ID
				parentId: "pid",	  //父节点ID
				title: "title",			  //节点名称 
				childName: "children",	  //子节点名称
			}
		});

		dtree.on("node('demoTree')" ,function(param){
			tree_id = param.param.nodeId;
			table.reload('dataTable', {
				where: {tree_id:param.param.nodeId},
				page:{curr: 1}
			})
		});

		table.render({
			elem: '#dataTable',
			url: '{:url('list')}?material_type={$material_type}',
			page: true,
			cols: [[
				{field: 'material_type_desc',title: '分类',align: 'center',unresize: false,width: {:get_col_width('material_type_desc',80)}, hide: getTableFieldIsHide('dataTable','material_type_desc')},
				{field: 'sn',title: '物料编码',align: 'center',unresize: false,width: {:get_col_width('sn',150)}, hide: getTableFieldIsHide('dataTable','sn')},
				{field: 'name',title: '物料名称',align: 'left',unresize: false,width: {:get_col_width('name',250)}, hide: getTableFieldIsHide('dataTable','name')},
				{field: 'data_type_desc',title: '类别',align: 'center',unresize: false,width: {:get_col_width('data_type_desc',80)}, hide: getTableFieldIsHide('dataTable','data_type_desc')},
				{field: 'type_desc',title: '进/出类型',align: 'center',unresize: false,width: {:get_col_width('type_desc',100)}, hide: getTableFieldIsHide('dataTable','type_desc')},
				{field: 'department',title: '领料部门',align: 'center',unresize: false,width: {:get_col_width('department',140)}, hide: getTableFieldIsHide('dataTable','department')},
				{field: 'order_sn',title: '单据编号',align: 'center',unresize: false,width: {:get_col_width('order_sn',140)}, hide: getTableFieldIsHide('dataTable','order_sn')},
				{field: 'supplier_id',title: '供应商',align: 'center',unresize: false,width: {:get_col_width('supplier_id',120)},templet: function(d){return d.supplier?d.supplier.name:'';}, hide: getTableFieldIsHide('dataTable','supplier_id')},
				{field: 'purchase_order',title: '采购单号',align: 'center',unresize: false,width: {:get_col_width('purchase_order'.$material_type,150)}, hide: getTableFieldIsHide('dataTable','purchase_order')},
				{field: 'before_num',title: '进/出前库存量',align: 'center',unresize: false,width: {:get_col_width('before_num',120)}, hide: getTableFieldIsHide('dataTable','before_num')},
				{field: 'after_num',title: '进/出后库存量',align: 'center',unresize: false,width: {:get_col_width('after_num',120)}, hide: getTableFieldIsHide('dataTable','after_num')},
				{field: 'stock_num',title: '进/出量',align: 'center',unresize: false,width: {:get_col_width('stock_num',80)}, hide: getTableFieldIsHide('dataTable','stock_num')},
				{field: 'stock_date',title: '进/出日期',align: 'center',sort: true,unresize: false,width: {:get_col_width('stock_date',150)}, hide: getTableFieldIsHide('dataTable','stock_date')},
				{field: 'unit',title: '单位',align: 'center',unresize: false,width: {:get_col_width('unit',80)}, hide: getTableFieldIsHide('dataTable','unit')},
				{field: 'remark',title: '备注',align: 'left',unresize: false,width: {:get_col_width('remark',100)}, hide: getTableFieldIsHide('dataTable','remark')},
				{field: 'stock_create_admin',title: '单据创建人',align: 'left',unresize: false,width: {:get_col_width('stock_create_admin',100)}, hide: getTableFieldIsHide('dataTable','stock_create_admin')},
				{field: 'create_admin',title: '审核人',align: 'left',unresize: false,width: {:get_col_width('create_admin',100)}, hide: getTableFieldIsHide('dataTable','create_admin')},
				{field: 'enter_order_sn',title: '入库单号',align: 'left',unresize: false,width: {:get_col_width('enter_order_sn',100)}, hide: getTableFieldIsHide('dataTable','enter_order_sn')},
				{field: 'sale_order_sn',title: '需挂账销售合同',align: 'center',unresize: false,width: {:get_col_width('sale_order_sn',140)}, hide: getTableFieldIsHide('dataTable','sale_order_sn')},
				{field: 'photo',title: '图片',align: 'center',unresize: false,width: {:get_col_width('photo',100)},templet: '#photo', hide: getTableFieldIsHide('dataTable','photo')},
			]],
			height: 'full-210',
			cellMinWidth: 80,
			limit:100,
			limits:[100,200,300,400,500],
			toolbar: '#toolbar',
			defaultToolbar: [{
				title: '刷新',
				layEvent: 'refresh',
				icon: 'layui-icon-refresh',
			}, 'filter']
		});

		table.on('sort(dataTable)', function(obj){
			table.reload('dataTable', {
				initSort: obj,
				where: {
					sort: obj.field,
					order: obj.type
				}
			},true);
		});

		table.on('tool(dataTable)', function(obj) {

		});

		table.on('toolbar(dataTable)', function(obj) {
			if (obj.event === 'export') {
				var index = layui.layer.load(1);
				let column 	= [{text:'分类',key:'material_type_desc'},{text:'物料编码',key:'sn'},{text:'物料名称',key:'name'},{text:'类别',key:'data_type_desc'},{text:'进/出类型',key:'type_desc'},{text:'单据编号',key:'order_sn'},{text:'供应商',key:'supplier.name'},{text:'进/出前库存量',key:'before_num'},{text:'进/出后库存量',key:'after_num'},{text:'进/出量',key:'stock_num'},{text:'进/出日期',key:'stock_date'},{text:'单位',key:'unit'},{text:'备注',key:'remark'},{text:'需挂账销售合同',key:'sale_order_sn'}];
				$.ajax({
					type : "get",
					url : "{:url('list')}?limit=10000",
					data: $('#searchForm').serialize(),
					success : function(data) {
						layui.layer.close(index);
						if (data.count > 0) {
							jsonToExcel(column, [column], data.data, '进出帐记录')
						}else{
							layui.layer.msg('暂无数据');
						}
					}
				});
			}else if (obj.event === 'refresh') {
				table.reload('dataTable');
			} 
		});

		form.on('submit(query)', function(data) {
			table.reload('dataTable', {
				where: data.field,
				page:{curr: 1}
			})
			return false;
		});
		
		table.on('colResized(dataTable)', function(obj){
			$.ajax({
				type : "post",
				url : "{:url('Common/setColWidth')}",
				data: {field:obj.col.field,width:obj.col.width,path:'{:request()->baseUrl()}'},
				success : function(data) {
	
				}
			});
		});
		table.on('colToggled(dataTable)', function(obj){
			setTableFieldIsHide(obj.config.id,obj.col.field,obj.col.hide);
		});
	})
</script>
<style>
.dtree{
    overflow-x:hidden;
    overflow-y: auto;
    width: 0px;
    width: 90%;
    height: 80vh;
}
.layui-col-md2{
    overflow:hidden;
}
</style>
{/block}
