{extend name="base" /}
{block name="body"}
<div class="layui-card">
	<div class="layui-card-body">
		<ul class="layui-timeline">
		{foreach $list as $vo}
			<li class="layui-timeline-item">
				<i class="layui-icon layui-timeline-axis">&#xe63f;</i>
				<div class="layui-timeline-content layui-text">
					<h4 class="layui-timeline-title">{$vo['create_time']}<span style="padding-left:50px;">操作人：{$vo['username']}</span></h4>
					<ul>
						<li>{$vo['remark']}</li>
					</ul>
				</div>
			</li>
		{/foreach}
		</ul>
	</div>
</div>


{/block}
{block name="script"}
<script>
	layui.use(['table', 'form', 'jquery','common'], function() {
		let table = layui.table;
		let form = layui.form;
		let $ = layui.jquery;

	})
</script>
{/block}
