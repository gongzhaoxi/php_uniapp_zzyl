{extend name="base" /}
{block name="body"}
<style>
.bom{margin:10px;font-size:12px;line-height:30px;}
.bom .title{font-weight:600;font-size:13px;}

#production-timeline{display:none;}
.production-timeline .count{color: rgb(51, 51, 51);margin-right:20px;}
.production-timeline ul li{color: rgb(153, 153, 153);}
.production-timeline .layui-text p{margin-top:0px;font-size:13px;}
</style>
<div class="layui-card">
	<div class="layui-card-body">
		<form class="layui-form" action="" id="searchForm">
			<div class="layui-form-item">
				<div class="layui-form-item layui-inline" style="width:150px;">
					<input type="text" name="customer_name" value="" placeholder="客户名称/订货单位" class="layui-input">						
				</div>	
				<div class="layui-form-item layui-inline" style="width:120px;">
					<input type="text" name="order_sn" value="" placeholder="销售合同号" class="layui-input">	
				</div>	
				<div class="layui-form-item layui-inline" style="width:190px;">
					<input type="text" name="create_time" value="" placeholder="下单日期" class="layui-input rangedate">	
				</div>	
				<div class="layui-form-item layui-inline" style="width:120px;">
					<input type="text" name="product_model" value="" placeholder="型号" class="layui-input">						
				</div>					
				<div class="layui-form-item layui-inline" style="width:190px;">
					<input type="text" name="produce_date" value="" placeholder="排产日期" class="layui-input rangedate">	
				</div>				
				<div class="layui-form-item layui-inline" style="width:190px;">
					<input type="text" name="delivery_time" value="" placeholder="交货日期" class="layui-input rangedate">	
				</div>
				<div class="layui-form-item layui-inline" style="width:120px;">
					<select name="region_type">
						<option value="">订单属性</option>
						{foreach $region_type as $key=>$vo}
						<option value="{$key}" {if isset($query['region_type']) && $query['region_type'] == $key}selected{/if}>{$vo}</option>
						{/foreach}
					</select>			
				</div>
				<div class="layui-form-item layui-inline" style="width:120px;">
					<select name="act">
						<option value="1" selected>未入库</option>
						<option value="2">已入库</option>
						<option value="">全部</option>
					</select>			
				</div>	
				<div class="layui-form-item layui-inline" style="width:120px;">
					<select name="approve_status">
						<option value="">审批状态</option>
						<option value="1">已审批</option>
						<option value="0" selected>未审批</option>
					</select>			
				</div>					
				<div class="layui-form-item layui-inline">
					<button class="pear-btn pear-btn-md pear-btn-primary" lay-submit lay-filter="query"><i class="layui-icon layui-icon-search"></i>查询</button>
				</div>
			</div>
		</form>
	</div>
</div>
<div class="layui-card">
	<div class="layui-card-body">
		<table id="dataTable" lay-filter="dataTable"></table>
	</div>
</div>
<script type="text/html" id="toolbar">
	<button class="pear-btn pear-btn-sm pear-btn-success" lay-event="approve"><i class="layui-icon layui-icon-form"></i>审批</button>
	<button class="pear-btn pear-btn-sm pear-btn-danger" lay-event="cancelProduce"><i class="layui-icon layui-icon-backspace"></i>取消生产</button>
	<button class="pear-btn pear-btn-sm" lay-event="export"><i class="layui-icon layui-icon-download-circle"></i>导出</button>
	<button class="pear-btn pear-btn-danger pear-btn-sm" lay-event="cancel"><i class="layui-icon layui-icon-delete"></i>撤回排产</button>
	<button class="pear-btn pear-btn-primary pear-btn-sm" lay-event="timeline"><i class="layui-icon layui-icon-list"></i>查看生产周期表</button>
	<button type="button" class="pear-btn pear-btn-warming pear-btn-sm" lay-event="print-tag">打印产品标签</button>
	<button type="button" class="pear-btn pear-btn-warming pear-btn-sm" lay-event="print-schedule">打印排产单</button>
	<button class="pear-btn pear-btn-sm pear-btn-success" lay-event="cancelPause"><i class="layui-icon layui-icon-form"></i>取消暂停</button>
</script>
<script type="text/html" id="options">
	<button class="pear-btn pear-btn-primary pear-btn-xs" lay-event="view">查看</button>
</script>
<script type="text/html" id="bom">
	<button class="pear-btn pear-btn-primary pear-btn-xs" lay-event="bom">查看</button>
</script>
<script type="text/html" id="produce_sn">
	{{d.produce_sn}}{{#  if(d.log_num > 0){ }}<span class="layui-badge" lay-event="log">更</span>{{#  } }} 
</script>
<script type="text/html" id="check_status_desc">
	{{#  if(d.check_status == 20){ }}
		<span class="layui-badge layui-bg-gray">{{d.check_status_desc}}</span>
	{{# }else{	}}
		<span class="layui-badge">{{d.check_status_desc}}</span>
	{{#  } }} 
	{{#  if(d.order_product.is_pause == 1){ }}
	<span class="layui-badge layui-bg-blue">暂停</span>
	{{#  } }} 
</script>

{/block}
{block name="script"}
<script>
	layui.use(['table', 'form', 'jquery','common'], function() {
		let table = layui.table;
		let form = layui.form;
		let $ = layui.jquery;

		table.render({
			elem: '#dataTable',
			url: '{:url('list')}?act=1&approve_status=0',
			page: true,
			cols: [[
				{type: 'checkbox',unresize: true},
				{field: 'produce_date',title: '排产日期',align: 'center',unresize: false,width: {:get_col_width('produce_date',120)},sort:true, hide: getTableFieldIsHide('dataTable','produce_date')},
				{field: 'check_status_desc',title: '排查状态',align: 'center',unresize: false,width: {:get_col_width('check_status_desc',120)}, templet: '#check_status_desc', hide: getTableFieldIsHide('dataTable','check_status_desc')},
				{field: 'customer_name',title: '客户名称',align: 'center',unresize: false,width: {:get_col_width('customer_name',100)}, hide: getTableFieldIsHide('dataTable','customer_name')},
				{field: 'produce_sn',title: '产品编码',align: 'center',unresize: false,width:{:get_col_width('produce_sn',200)}, templet: '#produce_sn', hide: getTableFieldIsHide('dataTable','produce_sn')},
				{field: 'product_model',title: '型号',align: 'center',unresize: false,width: {:get_col_width('product_model',120)}, templet: function(d){return d.order_product?d.order_product.product_model:'';}, hide: getTableFieldIsHide('dataTable','product_model')},
				{field: 'product_specs',title: '款式',align: 'center',unresize: false,width: {:get_col_width('product_specs',120)}, templet: function(d){return d.order_product?d.order_product.product_specs:'';}, hide: getTableFieldIsHide('dataTable','product_specs')},
				{field: 'color',title: '颜色',align: 'center',unresize: false,width: {:get_col_width('color',120)}, templet: function(d){return d.order_product?d.order_product.color:'';}, hide: getTableFieldIsHide('dataTable','color')},
				{field: 'num_desc',title: '数量',align: 'center',unresize: false,width: {:get_col_width('num_desc',100)}, hide: getTableFieldIsHide('dataTable','num_desc')},
				{field: 'order_sn',title: '销售合同号',align: 'center',unresize: false,width: {:get_col_width('order_sn',140)}, hide: getTableFieldIsHide('dataTable','order_sn')},
				{field: 'salesman',title: '业务员',align: 'center',unresize: false,width: {:get_col_width('salesman',100)}, hide: getTableFieldIsHide('dataTable','salesman')},
				{field: 'delivery_time',title: '交货日期',align: 'center',unresize: false,width: {:get_col_width('delivery_time',120)}, hide: getTableFieldIsHide('dataTable','delivery_time')},
				{field: 'address',title: '收货地址',align: 'center',unresize: false,width: {:get_col_width('address',150)}, hide: getTableFieldIsHide('dataTable','address')},
				{field: 'bom',title: '具体配置',align: 'center',unresize: false,width: {:get_col_width('bom',100)}, templet:'#bom', hide: getTableFieldIsHide('dataTable','bom')},
				{field: 'order_remark',title: '备注',align: 'center',unresize: false,width: {:get_col_width('order_remark',150)}, hide: getTableFieldIsHide('dataTable','order_remark')},
				{field: 'produce_type_desc',title: '加工方式',align: 'center',unresize: false,width: {:get_col_width('produce_type_desc',100)}, hide: getTableFieldIsHide('dataTable','produce_type_desc')},
				{field: 'approve_status_desc',title: '审批状态',align: 'center',unresize: false,width: {:get_col_width('approve_status_desc',100)}, hide: getTableFieldIsHide('dataTable','approve_status_desc')},
				{field: 'produce_status_desc',title: '生产状态',align: 'center',unresize: false,width: {:get_col_width('produce_status_desc',100)}, hide: getTableFieldIsHide('dataTable','produce_status_desc')},
				{title: '部件明细',toolbar: '#options',align: 'center',unresize: true,width: 100}
			]],

			cellMinWidth: 100,
			limit:90,
			height:'full-170',
			//skin: 'line',
			toolbar: '#toolbar',
			defaultToolbar: [{
				title: '刷新',
				layEvent: 'refresh',
				icon: 'layui-icon-refresh',
			}, 'filter']
		});

		table.on('sort(dataTable)', function(obj){
			table.reload('dataTable', {
				initSort: obj,
				where: {
					sort: obj.field,
					order: obj.type
				}
			},true);
		});

		table.on('tool(dataTable)', function(obj) {
			if (obj.event === 'remove') {
				layerConfirm('确定要删除该客户?','{:url('remove')}',{ids:[obj.data['id']]},function(res){
					obj.del();
				})
			}else if (obj.event === 'bom') {
				layer.open({
					type: 1, 
					area: ['500px', '300px'],
					content: '<div class="bom">'+obj.data.bom+'</div>'
				});
			} else if (obj.event === 'log') {
				openLayer('产品变更记录','{:url('erp.order/log')}?order_id='+obj.data.order_id+'&order_product_id='+obj.data.order_product_id,'90%','90%',function(){
						
				});	
			} else if (obj.event === 'view') {
				openLayer('BOM清单','{:url('view')}?id='+obj.data['id'],'100%','100%');
			}	
		});

		table.on('toolbar(dataTable)', function(obj) {
			if (obj.event === 'refresh') {
				table.reload('dataTable');
			}else if (obj.event === 'cancel') {
				tableAction(obj.config.id,'确定要撤回排产？','{:url('cancel')}');
			}else if (obj.event === 'export') {
				var index = layui.layer.load(1);
				let column 	= [{text:'排产日期',key:'produce_date'},{text:'排查状态',key:'check_status_desc'},{text:'产品编码',key:'produce_sn'},{text:'型号',key:'order_product.product_model'},{text:'款式',key:'order_product.product_specs'},{text:'数量',key:'num_desc'},{text:'销售合同号',key:'order_sn'},{text:'收货地址',key:'address'},{text:'具体配置',key:'bom'},{text:'业务员',key:'salesman'},{text:'发货类型',key:'shipping_type'},{text:'交货日期',key:'delivery_date'},{text:'生产状态',key:'cur_process'},{text:'备注',key:'order_remark'}];
				$.ajax({
					type : "get",
					url : "{:url('list')}?limit=100000",
					data: $('#searchForm').serialize(),
					success : function(data) {
						layui.layer.close(index);
						if (data.count > 0) {
							jsonToExcel(column, [column], data.data, '已排产订单')
						}else{
							layui.layer.msg('暂无数据');
						}
					}
				});
			}else if(obj.event ===  'timeline'){
				openLayer('七天生产周期表','{:url('production')}','700px', '80%');
			}else if(obj.event ===  'print-tag'){
				var checkStatus = table.checkStatus('dataTable');
				if(checkStatus.data.length == 0){
					layer.msg('请选择要操作的内容');
					return false;
				}
				var ids = [];
				for(var i in checkStatus.data) {
					ids.push(checkStatus.data[i].id);
				}
				toPrintPage(27,{id:ids.join(',')})
			}else if(obj.event ===  'print-schedule'){
				var checkStatus = table.checkStatus('dataTable');
				var ids = [];
				for(var i in checkStatus.data) {
					ids.push(checkStatus.data[i].id);
				}
				if(ids.length == 0){
					var res = $.ajax({
						url: '{:url('Common/orderProduceIds')}?act=1&approve_status=0',
						type: 'get',
						data: $('#searchForm').serialize(),
						dataType: 'json',
						async: false
					});
					ids = res.responseJSON.data;
				}
				if(ids.length == 0){
					layer.msg('没数据');
					return false;
				}
				toPrintPage(290,{id:ids.join(',')})
			}else if(obj.event ===  'approve'){
				var checkStatus = table.checkStatus('dataTable');
				if(checkStatus.data.length == 0){
					layer.msg('请选择要操作的内容');
					return false;
				}
				var ids = [];
				for(var i in checkStatus.data) {
					if(!checkStatus.data[i].can_approve){
						layer.msg(checkStatus.data[i].produce_sn+'已审批');
						return false;
					}
					ids.push(checkStatus.data[i].id);
				}
				layerConfirm('确定审批?','{:url('approve')}',{ids:ids},function(res){
					table.reload('dataTable');
				})
			}else if(obj.event ===  'cancelProduce'){
				var checkStatus = table.checkStatus('dataTable');
				if(checkStatus.data.length == 0){
					layer.msg('请选择要操作的内容');
					return false;
				}
				var ids = [];
				for(var i in checkStatus.data) {
					if(checkStatus.data[i].cancel_produce == 1){
						layer.msg(checkStatus.data[i].produce_sn+'已取消生产');
						return false;
					}
					if(checkStatus.data[i].produce_type == 2){
						layer.msg(checkStatus.data[i].produce_sn+'加工方式错误');
						return false;
					}
					ids.push(checkStatus.data[i].id);
				}
				layerConfirm('确定取消生产?','{:url('cancelProduce')}',{ids:ids},function(res){
					table.reload('dataTable');
				})
			}else if(obj.event ===  'cancelPause'){
				var checkStatus = table.checkStatus('dataTable');
				if(checkStatus.data.length == 0){
					layer.msg('请选择要操作的内容');
					return false;
				}
				var ids = [];
				for(var i in checkStatus.data) {
					if(checkStatus.data[i].order_product.is_pause == 0){
						layer.msg(checkStatus.data[i].produce_sn+'未暂停');
						return false;
					}
					ids.push(checkStatus.data[i].order_product_id);
				}
				layerConfirm('确定取消暂停?','{:url('erp.OrderProduct/cancelPause')}',{ids:ids},function(res){
					table.reload('dataTable');
				})
			}
		});

		form.on('submit(query)', function(data) {
			table.reload('dataTable', {
				where: data.field,
				page:{curr: 1}
			})
			return false;
		});
		
		table.on('colResized(dataTable)', function(obj){
			$.ajax({
				type : "post",
				url : "{:url('Common/setColWidth')}",
				data: {field:obj.col.field,width:obj.col.width,path:'{:request()->baseUrl()}'},
				success : function(data) {
	
				}
			});
		});
		table.on('colToggled(dataTable)', function(obj){
			setTableFieldIsHide(obj.config.id,obj.col.field,obj.col.hide);
		});
	})
</script>
{/block}
