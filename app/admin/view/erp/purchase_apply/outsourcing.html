{extend name="base" /}
{block name="body"}
<style>
.short{width:120px;}
</style>
<div class="layui-card">
	<div class="layui-card-body">
		<form class="layui-form" action="">
			<div class="layui-form-item">
				<div class="layui-form-item layui-inline">
					<input type="text" name="material" placeholder="物料名称/物料编码" class="layui-input">					
				</div>	
				<div class="layui-form-item layui-inline short">
					<input type="text" name="username" placeholder="申购人" class="layui-input">	
				</div>
				<div class="layui-form-item layui-inline">
					<select name="supplier_id" id="supplier_id" lay-search>
						<option value="">供应商</option>
						{foreach $supplier as $key=>$vo}
						<option value="{$vo['id']}">{$vo['name']}</option>
						{/foreach}
					</select>
				</div>
				<div class="layui-form-item layui-inline">
					<select name="cid" lay-search>
						<option value="">分类</option>
						<optgroup label="零件">
							{foreach $partn as $key=>$vo}
							<option value="{$vo['id']}">{$vo['name']}</option>
							{/foreach}
						 </optgroup>
						<optgroup label="部件">
							{foreach $component as $key=>$vo}
							<option value="{$vo['id']}">{$vo['name']}</option>
							{/foreach}
						 </optgroup>
					</select>
				</div>
				<div class="layui-form-item layui-inline">
					<input type="text" name="apply_date" id="apply_date" placeholder="申购日期" class="layui-input rangedate">	
				</div>	
				<div class="layui-form-item layui-inline">
					<input type="text" name="delivery_date" id="delivery_date" placeholder="要求交货日期" class="layui-input rangedate">	
				</div>	
				<div class="layui-form-item layui-inline short">
					<input type="text" name="remark" placeholder="备注" class="layui-input">	
				</div>				
				<div class="layui-form-item layui-inline">
					<button class="pear-btn pear-btn-md pear-btn-primary" lay-submit lay-filter="query"><i class="layui-icon layui-icon-search"></i>查询</button>
				</div>
			</div>
		</form>
	</div>
</div>
<div class="layui-card">
	<div class="layui-card-body">
		<table id="dataTable" lay-filter="dataTable"></table>
	</div>
</div>
<script type="text/html" id="toolbar">
	<button class="pear-btn pear-btn-primary pear-btn-sm" lay-event="add"><i class="layui-icon layui-icon-add-1"></i>新增申购单</button>
	<button class="pear-btn pear-btn-danger pear-btn-sm" lay-event="batchRemove"><i class="layui-icon layui-icon-delete"></i>删除</button>
	<button class="pear-btn pear-btn-warming pear-btn-sm" lay-event="print"><i class="layui-icon layui-icon-print"></i>打印申请单</button>
	<button class="pear-btn pear-btn-success pear-btn-sm" lay-event="orderAdd"><i class="layui-icon layui-icon-cart"></i>生成委外单</button>
</script>
<script type="text/html" id="options">
	<button class="pear-btn pear-btn-primary pear-btn-xs" lay-event="edit"><i class="layui-icon layui-icon-edit"></i></button>
	<button class="pear-btn pear-btn-danger pear-btn-xs" lay-event="remove"><i class="layui-icon layui-icon-delete"></i></button>
</script>
{/block}
{block name="script"}
<script>
	layui.use(['table', 'form', 'jquery','common'], function() {
		let table = layui.table;
		let form = layui.form;
		let $ = layui.jquery;

		table.render({
			elem: '#dataTable',
			url: '{:url('outsourcing')}?type=3',
			page: true,
			limit:90,
			height:'full-170',
			cols: [[
				{type: 'checkbox'},
				{field: 'sn',title: '物料编码',align: 'center',width: {:get_col_width('sn')}},
				{field: 'name',title: '物料名称',align: 'center',width: {:get_col_width('name')}},
				{field: 'apply_date',title: '申请日期',align: 'center',width: {:get_col_width('apply_date',120)}},
				{field: 'delivery_date',title: '要求交货日期',align: 'center',width: {:get_col_width('delivery_date',120)}},
				{field: 'material',title: '材料',align: 'center',width: {:get_col_width('material',100)}},
				{field: 'surface',title: '表面',align: 'center',width: {:get_col_width('surface',100)}},
				{field: 'color',title: '颜色',align: 'center',width: {:get_col_width('color',100)}},
				{field: 'category',title: '物料分类',align: 'center',width: {:get_col_width('category',100)}},
				{field: 'apply_num',title: '申购数量',align: 'center',width: {:get_col_width('apply_num',100)}},
				{field: 'unit',title: '单位',align: 'center',width: {:get_col_width('unit',100)}},
				{field: 'username',title: '申购人',align: 'center',width: {:get_col_width('username',100)}},
				{field: 'supplier_name',title: '供应商',align: 'center',width: {:get_col_width('supplier_name',100)}},
				{field: 'data_type_desc',title: '申购来源',align: 'center',width: {:get_col_width('data_type_desc',100)}},
				{field: 'remark',title: '备注',align: 'center',width: {:get_col_width('data_type_desc',100)}},
			]],
			cellMinWidth: 100,
			//skin: 'line',
			toolbar: '#toolbar',
			defaultToolbar: [{
				title: '刷新',
				layEvent: 'refresh',
				icon: 'layui-icon-refresh',
			}, 'filter']
		});

		table.on('sort(dataTable)', function(obj){
			table.reload('dataTable', {
				initSort: obj,
				where: {
					sort: obj.field,
					order: obj.type
				}
			},true);
		});

		table.on('tool(dataTable)', function(obj) {
			if (obj.event === 'remove') {
				layerConfirm('确定删除?','{:url('outsourcingRemove')}',{ids:[obj.data['id']]},function(res){
					obj.del();
				})
			}
		});

		table.on('toolbar(dataTable)', function(obj) {
			if (obj.event === 'add') {
				openLayer('申请委外','{:url('outsourcingAdd')}','90%','90%');
			}else if (obj.event === 'refresh') {
				table.reload('dataTable');
			} else if (obj.event === 'batchRemove') {
				tableAction(obj.config.id,'确定删除?','{:url('outsourcingRemove')}');
			}else if (obj.event === 'print') {
				var checkStatus = table.checkStatus('dataTable');
				if(checkStatus.data.length == 0){
					layer.msg('请选择要操作的内容');
					return false;
				}
				var id = [];			
				for(var i in checkStatus.data) {
					id.push(checkStatus.data[i].id);
				}
				toPrintPage(70,{id:id.join(',')});
			}else if (obj.event === 'orderAdd') {
				var checkStatus = table.checkStatus('dataTable');
				var supplier_id = $('#supplier_id').val();
				if(checkStatus.data.length == 0){
					layer.msg('请选择要操作的内容');
					return false;
				}
				var id = [];			
				for(var i in checkStatus.data) {
					id.push(checkStatus.data[i].id);
					if(supplier_id == '' && i == 0 && checkStatus.data[i].supplier_id && checkStatus.data[i].supplier_id[0]){
						supplier_id = checkStatus.data[i].supplier_id[0];
					}
				}
	
				openLayer('生成委外单','{:url('erp.PurchaseOrder/outsourcingAdd')}?ids='+id.join(',')+'&supplier_id='+supplier_id,'90%','90%');
			}
		});

		form.on('submit(query)', function(data) {
			table.reload('dataTable', {
				where: data.field,
				page:{curr: 1}
			})
			return false;
		});
		
		table.on('colResized(dataTable)', function(obj){
			$.ajax({
				type : "post",
				url : "{:url('Common/setColWidth')}",
				data: {field:obj.col.field,width:obj.col.width,path:'{:request()->baseUrl()}'},
				success : function(data) {
	
				}
			});
		});
		
	})
</script>
{/block}
