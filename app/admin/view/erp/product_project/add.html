{extend name="base" /}
{block name="body"}
<form class="layui-form" action="" method="post" data-table="projectTable">
	<input type="hidden"  name="product_id" id="product_id" value="{$product_id}">
	<div class="mainBox">
		<div class="main-container">
			{if $add_type == 1}
			<div class="layui-form-item">
				<label class="layui-form-label">方案编号</label>
				<div class="layui-input-block">
					<input type="text" maxlength="100" name="code" lay-verify="required"  value=""  placeholder="请输入方案编号,不可为空" autocomplete="off" class="layui-input">
				</div>	
			</div>	
			<div class="layui-form-item">	
				<label class="layui-form-label">方案名称</label>
				<div class="layui-input-block">
					<input type="text" maxlength="100" name="name" lay-verify="required" value=""  placeholder="请输入产品名称,不可为空" autocomplete="off" class="layui-input">
				</div>				
			</div>			
			<div class="layui-form-item">	
				<label class="layui-form-label">方案分类</label>
				<div class="layui-input-block">
					<select name="cid" lay-verify="required">
						{foreach $category as $key=>$vo}
						<option value="{$vo['id']}">{$vo['name']}</option>
						{/foreach}
					</select>
				</div>	
			</div>
			<div class="layui-form-item">	
				<label class="layui-form-label">方案功能</label>
				<div class="layui-input-block">
					{foreach $type as $key=>$vo}
					<input type="radio" name="type" value="{$key}" title="{$vo}" {if $key == 1}checked{/if}>
					{/foreach}
				</div>				
			</div>			
			<div class="layui-form-item">	
				<label class="layui-form-label">状态</label>
				<div class="layui-input-block">
					<input type="radio" name="status" value="1" title="启用" checked>
					<input type="radio" name="status" value="0" title="禁用" >
				</div>				
			</div>
			<div class="layui-form-item">	
				<label class="layui-form-label">默认配置</label>
				<div class="layui-input-block">
					<input type="radio" name="is_default" value="1" title="启用" checked>
					<input type="radio" name="is_default" value="0" title="禁用" >
				</div>				
			</div>			
			{else}
			<input type="hidden"  name="erp_project_id" id="erp_project_id">
			<div class="layui-form-item">
				<label class="layui-form-label">方案</label>
				<div class="layui-input-block">
					<input type="text" readonly id="erp_project_name" lay-verify="required" ts-selected="" placeholder="请选择,不可为空" autocomplete="off" class="layui-input">
				</div>	
			</div>	
			{/if}			
		</div>
	</div>
	<div class="bottom">
		<div class="button-container">
			<button type="submit" class="layui-btn layui-btn-normal layui-btn-sm" lay-submit="" lay-filter="*"><i class="layui-icon layui-icon-ok"></i>提交</button>
		</div>
	</div>
</form>
{/block}
{block name="script"}
<script>
layui.use(['tableSelect'], function () {
	var $ = layui.jquery;
	var tableSelect = layui.tableSelect;
	tableSelect.render({
		elem: '#erp_project_name',
		checkedKey: 'id',
		searchKey: 'keyword',
		searchPlaceholder: '方案名称/编码',
		table: {
			url: '{:url('Common/project')}',
			limit:100,			
			cols: [[
				{type: 'checkbox' },
				{field: 'code',title: '方案编号',align: 'center',unresize: false,width: {:get_col_width('code',200)}},
				{field: 'name',title: '方案名称',align: 'left',unresize: false,width: {:get_col_width('name',200)}},
				{field: 'category',title: '方案分类', align: 'center',unresize: false,width: {:get_col_width('category',200)}},
				{field: 'type_desc',title: '方案功能',align: 'center',unresize: false,width: {:get_col_width('type_desc',100)}},
			]]
		},
		done: function (elem, data) {
			var name = [];
			var id = [];
			$.each(data.data,function(index,item){
				name.push(item['name']);
				id.push(item['id']);
			})		
			elem.val(name.join(','));
			$('#erp_project_id').val(id.join(','));
		}
	})
});
</script>
{/block}
