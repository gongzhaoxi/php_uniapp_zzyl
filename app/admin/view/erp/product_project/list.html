<script type="text/html" id="bomtoolbar">

</script>
<script type="text/html" id="color_follow">

</script>
<script type="text/html" id="can_replace">

</script>
<script type="text/html" id="bill_type">

		 {{#  layui.each(bill_type, function(index, item){ }}
		 <option value="{{item.id}}" {{d.bill_type==item.id ? 'selected':'' }}>{{item.name}}</option>
		 {{#  }); }}
	 </select>
</script>




<script type="text/html" id="projectToolbar">

{block name="script"}
<script>
	var bill_type = {:json_encode($bill_type)} ;
	
	layui.use(['table', 'form', 'jquery','common'], function() {
		let table = layui.table;
		let form = layui.form;
		let $ = layui.jquery;
		let product_id;

		var h = ($(window).height() - 550)-2 ;
		if(h<=250){
			h= 250;
		}
	
		table.render({
			elem: '#dataTable',
			url: '{:url('list')}',
			page: true,		
			cols: [[
				{field: 'sn',title: '产品编码',align: 'center',unresize: true, hide: getTableFieldIsHide('dataTable','sn')},
				{field: 'name',title: '产品名称',align: 'left',unresize: true, hide: getTableFieldIsHide('dataTable','name')},
				{field: 'model',title: '型号',align: 'center',unresize: true,width: 100, hide: getTableFieldIsHide('dataTable','model')},
				{field: 'specs',title: '款式',align: 'center',unresize: true,width: 100, hide: getTableFieldIsHide('dataTable','specs')},
				{field: 'remark',title: '备注',align: 'left',unresize: true,width: 100, hide: getTableFieldIsHide('dataTable','remark')},
				{field: 'status_desc',title: '状态',align: 'center',unresize: true,width: 100, hide: getTableFieldIsHide('dataTable','status_desc')},
				{title: '操作',toolbar: '#options',align: 'center',unresize: true,width: 80,fixed: 'right'}
			]],
			cellMinWidth: 100,
			height: h,
			//skin: 'line',
			toolbar: '#toolbar',
			defaultToolbar: [{
				title: '刷新',
				layEvent: 'refresh',
				icon: 'layui-icon-refresh',
			}, 'filter']
		});

		table.on('sort(dataTable)', function(obj){
			table.reload('dataTable', {
				initSort: obj,
				where: {
					sort: obj.field,
					order: obj.type
				}
			},true);
		});

		table.on('tool(dataTable)', function(obj) {
			if (obj.event === 'remove') {
				layerConfirm('确定要删除该产品?','{:url('remove')}',{ids:[obj.data['id']]},function(res){
					obj.del();
				})
			} else if (obj.event === 'edit') {
				openLayer('修改产品','{:url('edit')}?id='+obj.data['id'],'80%','90%');
			} else if (obj.event === 'photo') {
				layerPhotos(obj.data['photo_link'],obj.data['id'])
			}else if (obj.event === 'copy') {
				layerConfirm('确定要复制该产品?','{:url('copy')}',{id:obj.data['id']},function(res){
					table.reload('dataTable');
				})
			}
		});

		table.on('toolbar(dataTable)', function(obj) {
			if (obj.event === 'add') {
				openLayer('新增产品','{:url('add')}','80%','90%');
			}else if (obj.event === 'refresh') {
				table.reload('dataTable');
			} else if (obj.event === 'batchRemove') {
				tableAction(obj.config.id,'确定要删除这些产品','{:url('remove')}');
			} else if (obj.event === 'recycle') {
				openLayer('回收站','{:url('recycle')}','80%','90%',function () {
					table.reload('dataTable');
				});
			}
		});

		form.on('submit(query)', function(data) {
			table.reload('dataTable', {
				where: data.field,
				page:{curr: 1}
			})
			return false;
		});
		
		table.on('row(dataTable)',function (obj) {
			window.renderData0(obj.data['id'])
			window.renderData1(obj.data['id'])
			window.renderData2(obj.data['id'])
			window.renderData3(obj.data['id'])
		})		
		
		
		window.renderData0 = function(id) {
			$(".empty").hide();
			product_id = id
			table.render({
				elem: '#projectTable',
				url: "{:url('erp.ProductProject/list')}?product_id="+product_id,
				page: false,
				limit:1000000,
				height: h,
				cols: [[
					{type: 'checkbox'},
					{field: 'code',title: '方案编号',align: 'center',unresize: true,width: 150, hide: getTableFieldIsHide('projectTable','code')},
					{field: 'name',title: '方案名称',align: 'left',unresize: true,width: 250, hide: getTableFieldIsHide('projectTable','name')},
					{field: 'category',title: '方案分类', edit: 'text',align: 'center',unresize: true,width: 120, hide: getTableFieldIsHide('projectTable','category')},
					{field: 'type_desc',title: '方案功能',align: 'center',unresize: true,width: 100, hide: getTableFieldIsHide('projectTable','type_desc')},
					{field: 'status_desc',title: '状态',align: 'center',unresize: true,width: 100, hide: getTableFieldIsHide('projectTable','status_desc')},
					{field: 'is_default_desc',title: '默认配置',align: 'center',unresize: true,width: 100, hide: getTableFieldIsHide('projectTable','is_default_desc')},
					{title: '操作',toolbar: '#options',align: 'center',unresize: true,width: 80,fixed: 'right'}
				]],
				toolbar: '#projectToolbar',
				defaultToolbar: [{
					title: '刷新',
					layEvent: 'refresh',
					icon: 'layui-icon-refresh',
				}, 'filter'],
				done:function(res, curr, count){
					form.render('select'); 
				}
			});
		}		
		table.on('tool(projectTable)', function(obj) {
			if (obj.event === 'remove') {
				layerConfirm('确定要删除该产品?','{:url('remove')}',{ids:[obj.data['id']]},function(res){
					obj.del();
				})
			} else if (obj.event === 'edit') {
				openLayer('修改产品','{:url('edit')}?id='+obj.data['id'],'80%','90%');
			} else if (obj.event === 'photo') {
				layerPhotos(obj.data['photo_link'],obj.data['id'])
			}else if (obj.event === 'copy') {
				layerConfirm('确定要复制该产品?','{:url('copy')}',{id:obj.data['id']},function(res){
					table.reload('projectTable');
				})
			}
		});

		table.on('toolbar(projectTable)', function(obj) {
			if (obj.event === 'add') {
				openLayer('新增方案',"{:url('erp.ProductProject/add')}?product_id="+product_id,'80%','90%');
			}else if (obj.event === 'refresh') {
				table.reload('projectTable');
			} else if (obj.event === 'batchRemove') {
				tableAction(obj.config.id,'确定要删除这些产品','{:url('remove')}');
			}
		});		
		
		
		
		
		
		
		
		window.renderData1 = function(id) {
			$(".empty").hide();
			product_id = id
			table.render({
				elem: '#bom1Table',
				url: "{:url('erp.ProductBom/list')}?data_type=1&product_id="+product_id,
				page: false,
				limit:1000000,
				height: h,
				cols: [[
					{type: 'checkbox'},
					{field: 'sn',title: '物料编码',align: 'center',unresize: true,width: 150,templet: function(d){return d.material?d.material.sn:'';}, hide: getTableFieldIsHide('bom1Table','sn')},
					{field: 'name',title: '物料名称',align: 'left',unresize: true,width: 250,templet: function(d){return d.material?d.material.name:'';}, hide: getTableFieldIsHide('bom1Table','name')},
					{field: 'num',title: '数量', edit: 'text',align: 'center',unresize: true,width: 120,templet: function(d){return d.num;}, hide: getTableFieldIsHide('bom1Table','num')},
					{field: 'unit',title: '单位',align: 'center',unresize: true,width: 100,templet: function(d){return d.material?d.material.unit:'';}, hide: getTableFieldIsHide('bom1Table','unit')},
					{field: 'type_desc',title: '物料属性',align: 'center',unresize: true,width: 100,templet: function(d){return d.material?d.material.type_desc:'';}, hide: getTableFieldIsHide('bom1Table','type_desc')},
					{field: 'bill_type',title: '类型',align: 'left',unresize: true,width: 150,templet: '#bill_type', hide: getTableFieldIsHide('bom1Table','bill_type')},
					{field: 'can_replace',title: '可换配',align: 'left',unresize: true,width: 100,templet: '#can_replace', hide: getTableFieldIsHide('bom1Table','can_replace')},
					{field: 'color_follow',title: '颜色是否跟随产品',align: 'left',unresize: true,width: 150,templet: '#color_follow', hide: getTableFieldIsHide('bom1Table','color_follow')}
				]],
				toolbar: '#bomtoolbar',
				defaultToolbar: [{
					title: '刷新',
					layEvent: 'refresh',
					icon: 'layui-icon-refresh',
				}, 'filter'],
				done:function(res, curr, count){
					form.render('select'); 
				}
			});
		}
		
		
		table.on('toolbar(bom1Table)', function(obj) {
			if (obj.event === 'add') {
				openLayer('添加物料','{:url('erp.ProductBom/add')}?table=bom1Table&data_type=1&product_id='+product_id,'80%','90%');
			}else if (obj.event === 'refresh') {
				table.reload('bom1Table');
			} else if (obj.event === 'batchRemove') {
				tableAction(obj.config.id,'确定要删除这些物料','{:url('erp.ProductBom/remove')}');
			}
		});
		
		table.on('edit(bom1Table)', function(obj){
			ajaxActionCall('{:url('erp.ProductBom/edit')}',{id:obj.data.id,num:obj.value})
		});		
		
		form.on('switch(color_follow)', function(data) {
			ajaxActionCall('{:url('erp.ProductBom/edit')}',{color_follow:data.elem.checked?1:0,id:this.value})
		});
		form.on('switch(can_replace)', function(data) {
			ajaxActionCall('{:url('erp.ProductBom/edit')}',{can_replace:data.elem.checked?1:0,id:this.value})
		});		
		
		form.on('select(bill_type)', function (data) {
			ajaxActionCall('{:url('erp.ProductBom/edit')}',{bill_type:data.value,id:$(data.elem).data("id")})
        });

		window.renderData2 = function(id) {
			$(".empty").hide();
			product_id = id
			table.render({
				elem: '#bom2Table',
				url: "{:url('erp.ProductBom/list')}?data_type=2&product_id="+product_id,
				page: false,
				limit:1000000,
				height: h,
				cols: [[
					{type: 'checkbox'},
					{field: 'sn',title: '物料编码',align: 'center',unresize: true,width: 150,templet: function(d){return d.material?d.material.sn:'';}, hide: getTableFieldIsHide('bom2Table','sn')},
					{field: 'name',title: '物料名称',align: 'left',unresize: true,width: 250,templet: function(d){return d.material?d.material.name:'';}, hide: getTableFieldIsHide('bom2Table','name')},
					{field: 'bill_type',title: '类型',align: 'left',unresize: true,width: 150,templet: '#bill_type', hide: getTableFieldIsHide('bom2Table','bill_type')},
					{field: 'num',title: '数量', edit: 'text',align: 'center',unresize: true,width: 120,templet: function(d){return d.num;}, hide: getTableFieldIsHide('bom2Table','num')},
					{field: 'unit',title: '单位',align: 'center',unresize: true,width: 100,templet: function(d){return d.material?d.material.unit:'';}, hide: getTableFieldIsHide('bom2Table','unit')},
				]],
				toolbar: '#bomtoolbar',
				defaultToolbar: [{
					title: '刷新',
					layEvent: 'refresh',
					icon: 'layui-icon-refresh',
				}, 'filter'],
				done:function(res, curr, count){
					form.render('select'); 
				}
			});
		}
		table.on('toolbar(bom2Table)', function(obj) {
			if (obj.event === 'add') {
				openLayer('添加物料','{:url('erp.ProductBom/add')}?table=bom2Table&data_type=2&product_id='+product_id,'80%','90%');
			}else if (obj.event === 'refresh') {
				table.reload('bom2Table');
			} else if (obj.event === 'batchRemove') {
				tableAction(obj.config.id,'确定要删除这些物料','{:url('erp.ProductBom/remove')}');
			}
		});
		table.on('edit(bom2Table)', function(obj){
			ajaxActionCall('{:url('erp.ProductBom/edit')}',{id:obj.data.id,num:obj.value})
		});


		window.renderData3 = function(id) {
			product_id = id
			table.render({
				elem: '#bom3Table',
				url: "{:url('erp.ProductBom/list')}?data_type=3&product_id="+product_id,
				page: false,
				limit:1000000,
				height: h,
				cols: [[
					{type: 'checkbox'},
					{field: 'sn',title: '物料编码',align: 'center',unresize: true,width: 150,templet: function(d){return d.material?d.material.sn:'';}, hide: getTableFieldIsHide('bom3Table','sn')},
					{field: 'name',title: '物料名称',align: 'left',unresize: true,width: 250,templet: function(d){return d.material?d.material.name:'';}, hide: getTableFieldIsHide('bom3Table','name')},
					{field: 'bill_type',title: '类型',align: 'left',unresize: true,width: 150,templet: '#bill_type', hide: getTableFieldIsHide('bom3Table','bill_type')},
					{field: 'num',title: '数量', edit: 'text',align: 'center',unresize: true,width: 120,templet: function(d){return d.num;}, hide: getTableFieldIsHide('bom3Table','bill_type')},
					{field: 'unit',title: '单位',align: 'center',unresize: true,width: 100,templet: function(d){return d.material?d.material.unit:'';}, hide: getTableFieldIsHide('bom3Table','unit')},
					
				]],
				toolbar: '#bomtoolbar',
				defaultToolbar: [{
					title: '刷新',
					layEvent: 'refresh',
					icon: 'layui-icon-refresh',
				}, 'filter'],
				done:function(res, curr, count){
					form.render('select'); 
				}
			});
		}
		table.on('toolbar(bom3Table)', function(obj) {
			if (obj.event === 'add') {
				openLayer('添加物料','{:url('erp.ProductBom/add')}?table=bom3Table&data_type=3&product_id='+product_id,'80%','90%');
			}else if (obj.event === 'refresh') {
				table.reload('bom3Table');
			} else if (obj.event === 'batchRemove') {
				tableAction(obj.config.id,'确定要删除这些物料','{:url('erp.ProductBom/remove')}');
			}
		});
		table.on('edit(bom3Table)', function(obj){
			ajaxActionCall('{:url('erp.ProductBom/edit')}',{id:obj.data.id,num:obj.value})
		});	
		table.on('colToggled(dataTable)', function(obj){
			setTableFieldIsHide(obj.config.id,obj.col.field,obj.col.hide);
		});
		table.on('colToggled(projectTable)', function(obj){
			setTableFieldIsHide(obj.config.id,obj.col.field,obj.col.hide);
		});
		table.on('colToggled(bom1Table)', function(obj){
			setTableFieldIsHide(obj.config.id,obj.col.field,obj.col.hide);
		});
		table.on('colToggled(bom2Table)', function(obj){
			setTableFieldIsHide(obj.config.id,obj.col.field,obj.col.hide);
		});
		table.on('colToggled(bom3Table)', function(obj){
			setTableFieldIsHide(obj.config.id,obj.col.field,obj.col.hide);
		});

	})
</script>
