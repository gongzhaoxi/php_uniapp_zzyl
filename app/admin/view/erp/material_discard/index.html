{extend name="base" /}
{block name="body"}
<style>
.layui-table-cell { height:auto;}
.bom{margin:10px;font-size:12px;line-height:30px;}
.bom .title{font-weight:600;font-size:13px;}
</style>
<div class="layui-card">
	<div class="layui-card-body">
		<form class="layui-form" action="" id="searchForm" lay-filter="searchForm">
			<div class="layui-form-item">
				<div class="layui-form-item layui-inline" >
					<input type="text" name="order_sn" placeholder="退货单编号" class="layui-input">	
				</div>	
				<div class="layui-form-item layui-inline" >
					<input type="text" name="sn" placeholder="物料编码" class="layui-input">	
				</div>	
				<div class="layui-form-item layui-inline" >
					<input type="text" name="name" placeholder="物料名称" class="layui-input">	
				</div>					
				<div class="layui-form-item layui-inline">
					<select name="supplier_id" lay-search>
						<option value="">供应商</option>
						{foreach $supplier as $key=>$vo}
						<option value="{$vo['id']}">{$vo['name']}</option>
						{/foreach}
					</select>
				</div>	
				<div class="layui-form-item layui-inline" style="width:190px;">
					<input type="text" name="stock_date" placeholder="退货日期" class="layui-input rangedate">					
				</div>					
				<div class="layui-form-item layui-inline">
					<button class="pear-btn pear-btn-md pear-btn-primary" lay-submit lay-filter="query"><i class="layui-icon layui-icon-search"></i>查询</button>
					<button type="reset" class="pear-btn pear-btn-md"><i class="layui-icon layui-icon-refresh"></i>重置</button>
				</div>
			</div>
		</form>
	</div>
</div>
<div class="layui-card">
	<div class="layui-card-body">
		<table id="dataTable" lay-filter="dataTable"></table>
	</div>
</div>
<script type="text/html" id="toolbar">
	<button class="pear-btn pear-btn-primary pear-btn-sm" lay-event="export"><i class="layui-icon layui-icon-export"></i>导出</button>
</script>
<script type="text/html" id="bom">
	<button class="pear-btn pear-btn-primary pear-btn-xs" lay-event="bom">查看</button>
</script>
{/block}
{block name="script"}
<script>
	layui.use(['table', 'form', 'jquery','common'], function() {
		let table = layui.table;
		let form = layui.form;
		let $ = layui.jquery;

		table.render({
			elem: '#dataTable',
			url: '{:url('index')}',
			page: true,
			limit:90,
			height:'full-250',			
			cols: [[
				{field: 'status_desc',title: '单据状态',align: 'center',unresize: false,minWidth: {:get_col_width('status_desc')}},
				{field: 'order_sn',title: '退货单编号',align: 'center',unresize: false,width: {:get_col_width('order_sn')}},
				{field: 'supplier_name',title: '供应商',align: 'center',unresize: false,width: {:get_col_width('supplier_name')}},
				{field: 'sn',title: '物料编码',align: 'center',unresize: false,width: {:get_col_width('sn')}},
				{field: 'name',title: '物料名称',align: 'center',unresize: false,width: {:get_col_width('name')}},
				{field: 'stock_num',title: '总需出库量',align: 'center',unresize: false,width: {:get_col_width('stock_num')}},
				{field: 'stocked_num',title: '已出库量',align: 'center',unresize: false,width: {:get_col_width('stocked_num')}},
				{field: 'stock_date',title: '退货日期',align: 'center',unresize: false,width: {:get_col_width('stock_date')}},
			]],
			cellMinWidth: 80,
			//skin: 'line',
			toolbar: '#toolbar',
			defaultToolbar: [{
				title: '刷新',
				layEvent: 'refresh',
				icon: 'layui-icon-refresh',
			}, 'filter']
		});

		table.on('sort(dataTable)', function(obj){
			table.reload('dataTable', {
				initSort: obj,
				where: {
					sort: obj.field,
					order: obj.type
				}
			},true);
		});

		table.on('toolbar(dataTable)', function(obj) {
			if (obj.event === 'refresh') {
				table.reload('dataTable');
			}else if (obj.event === 'export') {
				var data = form.val('searchForm');
				exportData('{:url('export')}',data);
			}
		});

		table.on('colResized(dataTable)', function(obj){
			$.ajax({
				type : "post",
				url : "{:url('Common/setColWidth')}",
				data: {field:obj.col.field,width:obj.col.width,path:'{:request()->baseUrl()}'},
				success : function(data) {
	
				}
			});
		});
		
		form.on('submit(query)', function(data) {
			table.reload('dataTable', {
				where: data.field,
				page:{curr: 1}
			})
			
		
			
			return false;
		});
		
	})
</script>
{/block}
