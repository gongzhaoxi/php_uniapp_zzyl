{extend name="base" /}
{block name="body"}
<div class="layui-card">
	<div class="layui-card-body">
		
		<div class="layui-tab layui-tab-brief">
			<ul class="layui-tab-title">
				<a href="{:url('index')}?type=1"><li class="{if $type == 1}layui-this{/if}">零件</li></a>
				<a href="{:url('index')}?type=2"><li class="{if $type == 2}layui-this{/if}">部件</li></a>
			</ul>
		</div>
		<table id="power-table" lay-filter="power-table"></table>
	</div>
</div>
<script type="text/html" id="power-toolbar">
	<button class="pear-btn pear-btn-primary pear-btn-sm" lay-event="add"><i class="layui-icon layui-icon-add-1"></i>新增</button>
	<button class="pear-btn pear-btn-success pear-btn-sm" lay-event="expandAll"><i class="layui-icon layui-icon-spread-left"></i>展开</button>
	<button class="pear-btn  pear-btn-sm" lay-event="foldAll"><i class="layui-icon layui-icon-shrink-right"></i>折叠</button>
</script>
<script type="text/html" id="power-bar">
	<button class="pear-btn pear-btn-primary pear-btn-xs" lay-event="edit"><i class="layui-icon layui-icon-edit"></i></button>
	<button class="pear-btn pear-btn-danger pear-btn-xs" lay-event="remove"><i class="layui-icon layui-icon-delete"></i></button>
</script>

{/block}
{block name="script"}
<script>
	layui.use(['table','form','treetable', 'jquery'],function () {
		let table = layui.table;
		let form = layui.form;
		let treetable = layui.treetable;
		let $ = layui.jquery;

		window.render = function(){
			treetable.render({
				treeColIndex: 0,
				treeSpid: 0,
				treeIdName: 'id',
				treePidName: 'pid',
				skin:'line',
				method:'post',
				treeDefaultClose: false,
				toolbar:'#power-toolbar',
				elem: '#power-table',
				url: '{:url('index')}?type={$type}',
				page: false,
				cols: [
					[
					{field: 'title', minWidth: 200, unresize: true,title: '名称'},
					{title: '状态', field: 'status',align: 'center',unresize: true,templet: function(d){return d.status==1?'启用':'禁用';},width: 100},
					{field: 'sort', title: '排序',unresize: true},
					{title: '操作',templet: '#power-bar', unresize: true,width: 150, align: 'center'}
					]
				]
			});
		}
		
		render();
		
		table.on('tool(power-table)',function(obj){
			if (obj.event === 'remove') {
				window.remove(obj);
			} else if (obj.event === 'edit') {
				openLayer('修改菜单','{:url('edit')}?id='+obj.data['id'],'80%','90%');
			} 
		})

		table.on('toolbar(power-table)', function(obj){
			if(obj.event === 'add'){
				openLayer('新增菜单','{:url('add')}?type={$type}','80%','90%');
			} else if(obj.event === 'expandAll'){
				treetable.expandAll("#power-table");
			} else if(obj.event === 'foldAll'){
				treetable.foldAll("#power-table");
			}
		});

		window.remove = function(obj){
			layer.confirm('确定要删除该菜单', {
				icon: 3,
				title: '提示'
			}, function(index) {
				layer.close(index);
				let loading = layer.load();
				$.ajax({
					url:'{:url('remove')}' + '',
					data:{id:obj.data['id']},
					dataType: 'json',
					type: 'POST',
					success: function(res) {
						layer.close(loading);
						//判断有没有权限
						if(res && res.code==999){
							layer.msg(res.msg, {
								icon: 5,
								time: 2000, 
							})
							return false;
						}else if (res.code==200) {
							layer.msg(res.msg, {
								icon: 1,
								time: 1000
							}, function() {
								top.location.reload();
							});
						} else {
							layerConfirm(res.msg,'{:url('remove')}',{id:obj.data['id'],type:true},function(res){
								location.reload();
							})
						}
					}
				})
			});
		}
		form.on('switch(status)', function(data) {
			ajaxActionCall('{:url('status')}',{status:data.elem.checked?1:2,id:this.value})
		});
	})
</script>
{/block}
