{extend name="base" /}
{block name="body"}
<form class="layui-form" action="" method="post" data-table="dataTable">
	<div class="mainBox">
		<div class="main-container">
			<div class="layui-form-item">
				<label class="layui-form-label">方案编号</label>
				<div class="layui-input-block">
					<input type="text" maxlength="100" name="code" lay-verify="required"  value=""  placeholder="请输入方案编号,不可为空" autocomplete="off" class="layui-input">
				</div>	
			</div>	
			<div class="layui-form-item">	
				<label class="layui-form-label">方案名称</label>
				<div class="layui-input-block">
					<input type="text" maxlength="100" name="name" lay-verify="required" value=""  placeholder="请输入产品名称,不可为空" autocomplete="off" class="layui-input">
				</div>				
			</div>			
			<div class="layui-form-item">	
				<label class="layui-form-label">方案分类</label>
				<div class="layui-input-block">
					<select name="cid" lay-verify="required">
						{foreach $category as $key=>$vo}
						<option value="{$vo['id']}">{$vo['name']}</option>
						{/foreach}
					</select>
				</div>	
			</div>
			<div class="layui-form-item">	
				<label class="layui-form-label">方案功能</label>
				<div class="layui-input-block">
					{foreach $type as $key=>$vo}
					<input type="radio" name="type" value="{$key}" title="{$vo}" {if $key == 1}checked{/if}>
					{/foreach}
				</div>				
			</div>			
			<div class="layui-form-item">	
				<label class="layui-form-label">状态</label>
				<div class="layui-input-block">
					<input type="radio" name="status" value="1" title="启用" checked>
					<input type="radio" name="status" value="0" title="禁用" >
				</div>				
			</div>										
		</div>
	</div>
	<div class="bottom">
		<div class="button-container">
			<button type="submit" class="layui-btn layui-btn-normal layui-btn-sm" lay-submit="" lay-filter="*"><i class="layui-icon layui-icon-ok"></i>提交</button>
		</div>
	</div>
</form>
{/block}
