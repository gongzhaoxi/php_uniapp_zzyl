{extend name="base" /}
{block name="body"}
<style>
.layui-input-block {margin-left: 150px;}
.layui-form-label {width: 120px;}
</style>
<form class="layui-form" action="" method="post">
	<div class="mainBox">
		<div class="main-container">
			<div class="layui-form-item">
				<label class="layui-form-label">审批人</label>
				<div class="layui-input-block">
					<select name="auditing_admin_id" lay-verify="required" lay-search="">
						{foreach $admins as $key=>$vo}
						<option value="{$vo['id']}">{$vo['nickname']}</option>
						{/foreach}
					</select>
				</div>
			</div>				
			<div class="layui-form-item">
				<label class="layui-form-label">接收人</label>
				<div class="layui-input-block">
					<select name="notice_admin_id" lay-verify="required" xm-select="notice_admin" xm-select-search>
						{foreach $admins as $key=>$vo}
						<option value="{$vo['id']}">{$vo['nickname']}</option>
						{/foreach}
					</select>
				</div>
			</div>			
			
			<div class="layui-form-item">
				<label class="layui-form-label">通知内容</label>
				<div class="layui-input-block">
					<textarea placeholder="请输入内容" lay-verify="required" name="content" class="layui-textarea"></textarea>
				</div>
			</div>
			<div class="layui-form-item">
				<label class="layui-form-label">附件</label>
				<div class="layui-input-block">
					{:$form->files('file')}
				</div>
			</div>				
		</div>
	</div>
	<div class="bottom">
		<div class="button-container">
			<button type="submit" class="layui-btn layui-btn-normal layui-btn-sm" lay-submit="" lay-filter="*"><i class="layui-icon layui-icon-ok"></i>提交</button>
		</div>
	</div>
</form>
{/block}
