{extend name="base" /}
{block name="body"}
<style>
.layui-input-block {margin-left: 150px;}
.layui-form-label {width: 120px;}
</style>
<form class="layui-form" action="" method="post" data-reload="2">
	<input type="hidden"  name="order_id" id="order_id"  value="{$model['order_id']&&$model['order']?$model['order']['id']:''}">
	<input type="hidden"  name="id"  value="{$model['id']}">
	<div class="mainBox">
		<div class="main-container">
			<blockquote class="layui-elem-quote">单据单头信息</blockquote>
			<div class="layui-form-item">
				<div class="layui-row" style="margin-bottom:10px;">
					<div class="layui-col-md4">
						<label class="layui-form-label">供应商</label>
						<div class="layui-input-block">
							<select name="supplier_id" lay-verify="required" lay-search="">
								{foreach $supplier as $key=>$vo}
								<option value="{$vo['id']}" {if $model['supplier_id'] == $vo['id']}selected{/if}>{$vo['name']}</option>
								{/foreach}
							</select>
						</div>
					</div>
					<div class="layui-col-md4">
						<label class="layui-form-label">入库批次号</label>
						<div class="layui-input-block">
							<input type="text"   name="batch_number" value="{$model['batch_number']}" lay-verify="required" placeholder="请填写,不可为空" autocomplete="off" class="layui-input">
						</div>	
					</div>	
					<div class="layui-col-md4">
						<label class="layui-form-label">入库类型</label>
						<div class="layui-input-inline" style="width:130px;">
							<select name="type" lay-verify="required">
								{foreach $type as $key=>$vo}
								{if !in_array($key,$hidden_key)}<option value="{$key}" {if $model['type'] == $key}selected{/if}>{$vo}</option>{/if}
								{/foreach}
							</select>
						</div>
						<input type="hidden" name="check_status" value="0" >
						<div class="layui-input-inline" style="width: 100px;margin: 0;">
							 <input type="checkbox" name="check_status" value="1" {if $model->materials[0]['need_check']}checked{/if} title="需质检">
						</div>						
					</div>					
				</div>	
				<div class="layui-row" style="margin-bottom:10px;">
					<div class="layui-col-md4">
						<label class="layui-form-label">入库日期</label>
						<div class="layui-input-block">
							<input type="text"  readonly name="stock_date" value="{$model['stock_date']}" lay-verify="required" placeholder="请选择,不可为空" autocomplete="off" class="layui-input date">
						</div>	
					</div>
					<div class="layui-col-md4">
						<label class="layui-form-label">需挂账销售合同</label>
						<div class="layui-input-block">
							<input type="text" maxlength="100"  readonly id="order_sn" value="{$model['order_id']&&$model['order']?$model['order']['order_sn']:''}" ts-selected="{$model['order_id']&&$model['order']?$model['order_id']:''}" placeholder="请选择,可为空" autocomplete="off" class="layui-input">
						</div>
					</div>
					<div class="layui-col-md4">
						<label class="layui-form-label">备注/用途说明</label>
						<div class="layui-input-block">
							<input type="text" maxlength="255" name="remark" value="{$model['remark']}" placeholder="请输入" autocomplete="off" class="layui-input">
						</div>	
					</div>					
				</div>
				<div class="layui-row">
					<div class="layui-col-md4">
						<label class="layui-form-label">采购单号</label>
						<div class="layui-input-block">
							<input type="text" maxlength="255" name="purchase_order" value="{$model['purchase_order']}"  placeholder="请输入" autocomplete="off" class="layui-input">
						</div>	
					</div>					
				</div>					
			</div>			
			<blockquote class="layui-elem-quote">相关物料信息</blockquote>
			<div class="layui-row layui-col-space10">
				<div class="layui-col-md11">
					<select id="selectId"  xm-select="selectId" xm-select-radio  xm-select-search=""></select>
				</div>
				<div class="layui-col-md1">
					<button type="button" class="layui-btn showSearch">高级筛选</button>
				</div>
			</div>
			<table class="layui-table">
				<thead>
					<tr>
						<th>物料编码</th>
						<th>物料名称</th>
						<th>仓位</th>
						<th>现有库存量</th>
						<th>入库数量</th>
						<th>备注</th>
						<th>操作</th>
					</tr> 
				</thead>
				<tbody id="tbody">

				</tbody>
			</table>
		</div>
	</div>
	<div class="bottom">
		<div class="button-container">
			{if $model['can_edit']}<button type="submit" class="layui-btn layui-btn-normal layui-btn-sm" lay-submit="" lay-filter="*"><i class="layui-icon layui-icon-ok"></i>保存</button>{/if}
			<button onclick="toPrintPage(6,{id:{$model['id']}})" type="button" class="layui-btn layui-btn-warm layui-btn-sm"><i class="layui-icon layui-icon-file-b"></i>打印报检单</button>
		</div>
	</div>
</form>
{/block}
{block name="script"}
<script>
var default_materials = {:json_encode($model->materials)};
var default_materials_ids = {:json_encode($model->materials->column('material_id'))};

layui.use(['tableSelect','select'], function () {
	var $ = layui.jquery;
	var tableSelect = layui.tableSelect;
	var select = layui.select;
	var warehouses = {:json_encode($warehouse)};
	var form = layui.form;
	tableSelect.render({
		elem: '#order_sn',
		checkedKey: 'id',
		searchKey: 'keyword',
		searchPlaceholder: '客户名称/销售合同号',
		table: {
			url: '{:url('common/order')}',		
			cols: [[
				{type: 'radio' },
				{field: 'region_type_desc',title: '订单性质',align: 'center',width: 100},
				{field: 'customer_name',title: '客户名称/订货单位',align: 'center',width: 200},
				{field: 'order_sn',title: '销售合同号',align: 'center',width: 120},
				{field: 'address',title: '收货地址/国家',align: 'center',width: 200},
				{field: 'order_product_num',title: '订购总数量',align: 'center',width: 120},
			]]
		},
		done: function (elem, data) {
			elem.val(data.data[0]['order_sn']);
			$('#order_id').val(data.data[0]['id']);
		}
	})
	
	window.deleteMaterial = function(_id){
		$('#material_'+_id).remove();	
	}
	
	
	$.ajax({
		type: 'post',
		url:'{:url('common/warehouseStock')}',
		data: {material_id:default_materials_ids},
		dataType: 'json',
		success: function(res){
			layui.each(default_materials, function (index, item) {
				item.material.stock_num = item.stock_num;
				item.material._name = item.material.name;
				item.material.remark = item.remark;
				item.material.warehouse_id = item.warehouse_id;
				$('#tbody').prepend(getHtml(item.material,res.data));	
			})	
			form.render('select');
			return false;		     
		},
		error : function() {
			
		}
	});	
	
	
	function getHtml(item,material_stock){
		var html = '<tr id="material_'+item.id+'"><input type="hidden"  name="material['+item.id+'][id]" value="'+item.id+'" >';
		html += '	<td>'+item.sn+'</td>';
		html += '	<td>'+(item._name?item._name:item.name)+'</td>';
		html += '	<td><select name="material['+item.id+'][warehouse_id]" lay-filter="warehouse_id" lay-verify="required|number"  >';
		var default_stock = 0;
		$.each(warehouses, function(index, warehouse) {
			var stock = material_stock && material_stock[item.id] && material_stock[item.id][warehouse.id]?material_stock[item.id][warehouse.id]:0;
			html += '	<option data-stock="'+stock+'" '+(warehouse.id == item.warehouse_id ?'selected':'')+' value="'+warehouse.id+'">'+warehouse.sn+'</option>';
			if(warehouse.id == item.warehouse_id){
				default_stock = stock;
			}
		});		
		html += '	</select></td>';
		html += '	<td>'+default_stock+'</td>';
		html += '	<td><input type="text"  name="material['+item.id+'][stock_num]" value="'+(item.stock_num?item.stock_num:'')+'" class="layui-input stock_num" lay-verify="required|number" placeholder="请输入数量"></td>';
		html += '	<td><input type="text"  name="material['+item.id+'][remark]" value="'+(item.remark?item.remark:'')+'" class="layui-input remark" data-key="remark" placeholder=""></td>';
		html += '	<td><button type="button" onclick="deleteMaterial('+item.id+')" class="layui-btn layui-btn-xs layui-btn-danger">删除</button></td>';
		html += '</tr>';
		return html;
	}
	
	form.on('select(warehouse_id)', function(data){
		$(data.elem).closest('tr').find('.stock').html($(data.elem).find('option:selected').data('stock'));
	});	
	
	select.config("selectId",{
		type:"post",
		searchUrl:'{:url('common/material')}?type={$model['material_type']}&limit=50&status=1',    //请求地址
		searchName: "keyword",
		keyName:"name",
		keyVal:"id" , 
		beforeSuccess: function(id, url, searchVal, result){
			$.each(result.data, function(index, item) {
				item._name = item.name;
				item.name = '物料编码：'+item.sn + ' | 物料名称：' + item.name + ' | 现有库存：' + item.stock + '';
			});
			return result;
		}
	},false)
	
	select.on('selectId', function(id, vals, item, isAdd, isDisabled){
		//console.log(item);console.log(vals);console.log(isAdd);
		if($('#material_'+item.id).length>0){
			layer.msg('物料已添加');	
			$('#material_'+item.id).find('.stock_num').focus();
		}else if(item && item.id && item.name){
			
			ajaxActionCall('{:url('common/warehouseStock')}',{material_id:item.id},function(res){
				$('#tbody').prepend(getHtml(item,res.data));	
				$('#material_'+item.id).find('.stock_num').focus();
				form.render('select');
			},false)
			
		}
		$('.xm-select-parent>.xm-form-select').removeClass('xm-form-selected');
		return false;
	});


	$('.showSearch').click(function(){
		layer.open({
			type: 2
			,title: '高级筛选'
			,content: '{:url('common/material')}?type={$model['material_type']}&status=1'
			,area: ['95%','95%']
			,success: function(layero, index){
				var iframeWindow = window['layui-layer-iframe'+ index];
				layero.find('iframe').contents().find('#confirmSelect').click(function(){
					selectFuc();
					return false;
				})
				
				layero.find('iframe').contents().find('body').on("keydown", function(event) {
					if (event.which === 13) {
						selectFuc();
						return false;
					}
				});
				
				function selectFuc(){
					if(iframeWindow.selected_ids.length == 0){
						layui.layer.msg('请选择物料');
					}else{					
						ajaxActionCall('{:url('common/warehouseStock')}',{material_id:iframeWindow.selected_ids},function(res){
							$.each(iframeWindow.selected_items,function(idx,item){
								if($('#material_'+item.id).length == 0){
									$('#tbody').prepend(getHtml(item,res.data));	
									$('#material_'+item.id).find('.stock_num').focus();
								}
							})
							layui.layer.close(index);
							form.render('select');
						},false)
					}
					return false;
				}
			}
		});
	})	


});
</script>
{/block}
