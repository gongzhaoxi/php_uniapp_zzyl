{extend name="base" /}
{block name="body"}
<style>
.layui-input-block {margin-left: 150px;}
.layui-form-label {width: 120px;}
</style>
<form class="layui-form" action="" method="post">
	 <input type="hidden" name="id" value="{$model['id']}" >
	 <div class="mainBox">
		<div class="main-container">
			<div class="layui-form-item">
				<label class="layui-form-label">编码</label>
				<div class="layui-input-block">
					<input type="text" maxlength="100" name="code" value="{$model['code']}"  lay-verify="required" placeholder="请输入,不可为空" autocomplete="off" class="layui-input">
				</div>
			</div>
			<div class="layui-form-item">
				<label class="layui-form-label">名称</label>
				<div class="layui-input-block">
					<input type="text" maxlength="100" name="name" value="{$model['name']}"  lay-verify="required" placeholder="请输入,不可为空" autocomplete="off" class="layui-input">
				</div>
			</div>	
			{if $model['data_type'] != 3}	
			<div class="layui-form-item">
				<label class="layui-form-label">类型</label>
				<div class="layui-input-block">
					<select name="material_category" lay-search >
						<option value="重要物资" {if $model['material_category'] == '重要物资'}selected{/if} >重要物资</option>
						<option value="一般物资" {if $model['material_category'] == '一般物资'}selected{/if} >一般物资</option>
						<option value="辅助物资" {if $model['material_category'] == '辅助物资'}selected{/if} >辅助物资</option>
					</select>
				</div>
			</div>	
			{/if}				
			<div class="layui-form-item">
				<label class="layui-form-label">版本号</label>
				<div class="layui-input-block">
					<input type="text" maxlength="100" name="version" value="{$model['version']}" lay-verify="required" placeholder="请输入" autocomplete="off" class="layui-input">
				</div>
			</div>				
			<div class="layui-form-item">
				<label class="layui-form-label">所属物资</label>
				<div class="layui-input-block">
					<select name="data_id" layui-saerch  xm-select="user_id" xm-select-search xm-select-search-type="dl" required  lay-verify="required" xm-select-height="36px">
						<option value="0" {if in_array(0,$model['data_id'])}selected{/if}>通用</option>
						{foreach $data as $key=>$vo}
						<option value="{$vo['id']}" {if in_array($vo['id'],$model['data_id'])}selected{/if}>{$vo['sn']}/{$vo['name']}</option>
						{/foreach}
					</select>
				</div>
			</div>	
			<div class="layui-form-item">
				<label class="layui-form-label">文件</label>
				<div class="layui-input-block">
					{:$form->file('attachment',$model['attachment'])}
				</div>
			</div>				
			<div class="layui-form-item">
				<label class="layui-form-label">状态</label>
				<div class="layui-input-block">
					<input type="radio" name="status" value="1" title="启用" {if $model['status'] == 1}checked{/if}>
					<input type="radio" name="status" value="0" title="禁用" {if $model['status'] == 0}checked{/if}>
				</div>
			</div>			
		</div>
	</div>       
	<div class="bottom">
		<div class="button-container">
			<button type="submit" class="layui-btn layui-btn-normal layui-btn-sm" lay-submit="" lay-filter="*"><i class="layui-icon layui-icon-ok"></i>提交</button>
		</div>
    </div>
</form>
{/block}
{block name="script"}
<script>
layui.use(['form','element','iconPicker','jquery','dtree'], function() {
	var form = layui.form;
	var element = layui.element;
	var $ = layui.jquery;


});
</script>
{/block}
