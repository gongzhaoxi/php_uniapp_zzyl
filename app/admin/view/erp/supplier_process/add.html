{extend name="base" /}
{block name="body"}
<style>
.layui-input-block {margin-left: 150px;}
.layui-form-label {width: 120px;}
</style>
<form class="layui-form" action="" method="post">
	<div class="mainBox">
		<div class="main-container">
			<div class="layui-form-item">
				<label class="layui-form-label">供应商</label>
				<div class="layui-input-block">
					<select name="supplier_id" lay-verify="required"  lay-search>
						<option value="">请选择</option>
						{foreach $supplier as $key=>$vo}
						<option value="{$vo['id']}">{$vo['name']}</option>
						{/foreach}
					</select>
				</div>
			</div>				
			<div class="layui-form-item">
				<label class="layui-form-label">工艺编码</label>
				<div class="layui-input-block">
					<input type="text" maxlength="100" name="sn" lay-verify="required" placeholder="请输入工艺编码" autocomplete="off" class="layui-input">
				</div>
			</div>
			<div class="layui-form-item">
				<label class="layui-form-label">工艺名称</label>
				<div class="layui-input-block">
					<input type="text" maxlength="100" name="name" lay-verify="required" placeholder="请输入工艺名称,不可为空" autocomplete="off" class="layui-input">
				</div>
			</div>				
			<div class="layui-form-item">
				<label class="layui-form-label">上次单价</label>
				<div class="layui-input-block">
					<input type="text"  name="last_price" lay-verify="required|number" value="0" placeholder="请输入" autocomplete="off" class="layui-input">
				</div>
			</div>				
			<div class="layui-form-item">
				<label class="layui-form-label">本次单价</label>
				<div class="layui-input-block">
					<input type="text"  name="price" lay-verify="required|number" value="0" placeholder="请输入" autocomplete="off" class="layui-input">
				</div>
			</div>				
			<div class="layui-form-item">
				<label class="layui-form-label">单位</label>
				<div class="layui-input-block">
					<input type="text" maxlength="30" name="unit"  placeholder="请输入" autocomplete="off" class="layui-input">
				</div>
			</div>				
			<div class="layui-form-item">
				<label class="layui-form-label">生效日期</label>
				<div class="layui-input-block">
					<input type="text" maxlength="30" name="effective_date" lay-verify="required"  value="2020-01-01" placeholder="请输入" autocomplete="off" class="layui-input date">
				</div>
			</div>
			<div class="layui-form-item">
				<label class="layui-form-label">状态</label>
				<div class="layui-input-block">
					<input type="radio" name="status" value="1" title="启用" checked>
					<input type="radio" name="status" value="0" title="禁用" >
				</div>
			</div>
		</div>
	</div>
	<div class="bottom">
		<div class="button-container">
			<button type="submit" class="layui-btn layui-btn-normal layui-btn-sm" lay-submit="" lay-filter="*"><i class="layui-icon layui-icon-ok"></i>提交</button>
			<button type="reset" class="layui-btn layui-btn-primary layui-btn-sm"><i class="layui-icon layui-icon-refresh"></i>重置</button>
		</div>
	</div>
</form>
{/block}
