{extend name="base" /}
{block name="body"}
<form class="layui-form" action="" data-reload="3">
	<input type="hidden"  name="id" value="{$model->id??''}" >
	<div class="mainBox">
		<div class="main-container">
			<div class="layui-form-item">
				<label class="layui-form-label">名称</label>
				<div class="layui-input-block">
					<input type="text"  name="name" value="{$model->name??''}" lay-verify="required" placeholder="请输入名称" autocomplete="off" class="layui-input">
				</div>
			</div>
			<div class="layui-form-item">
				<label class="layui-form-label">类型</label>
				<div class="layui-input-block">
					<input type="text" maxlength="30" name="type" value="{$model->type??''}" lay-verify="required" placeholder="请输入类型" autocomplete="off" class="layui-input">
				</div>
			</div>	
			<div class="layui-form-item">
				<label class="layui-form-label">状态</label>
				<div class="layui-input-block">
				  <input type="radio" name="status" value="0" title="禁用" {if $model->status == 0}checked{/if}>
				  <input type="radio" name="status" value="1" title="启用" {if $model->status == 1}checked{/if}>
				</div>
			</div>			
			<div class="layui-form-item">
				<label class="layui-form-label">描述</label>
				<div class="layui-input-block">
					<textarea name="remark" class="layui-textarea">{$model->remark??''}</textarea>
				</div>
			</div>
		</div>
	</div>
	<div class="bottom">
        <div class="button-container">
            <button type="submit" class="layui-btn layui-btn-normal layui-btn-sm" lay-submit="" lay-filter="*">
                <i class="layui-icon layui-icon-ok"></i>
                提交
            </button>
            <button type="reset" class="layui-btn layui-btn-primary layui-btn-sm">
                <i class="layui-icon layui-icon-refresh"></i>
                重置
            </button>
        </div>
    </div>
</form>
{/block}
