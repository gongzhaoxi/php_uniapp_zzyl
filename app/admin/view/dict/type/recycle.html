{extend name="base" /}
{block name="body"}
	<div class="layui-card">
		<div class="layui-card-body">
			<table id="dataTable" lay-filter="dataTable"></table>
		</div>
	</div>
	<script type="text/html" id="toolbar">
		<button class="pear-btn pear-btn-primary pear-btn-sm" lay-event="batchRecovery"><i class="layui-icon layui-icon-refresh"></i>恢复数据</button>
		<button class="pear-btn pear-btn-danger pear-btn-sm" lay-event="batchRemove"><i class="layui-icon layui-icon-delete"></i>彻底删除</button>
	</script>
{/block}
{block name="script"}
<script>
layui.use(['table', 'form', 'jquery'], function() {
	let table = layui.table;
	let form = layui.form;
	let $ = layui.jquery;

	table.render({
		elem: '#dataTable',
		url: '{:url('recycle')}',
		page: true,
		cols: [[
			{type: 'checkbox'},
			{title: '字典名称',field: 'name',align: 'center',width: 120},
			{title: '字典类型',field: 'type',align: 'center',width: 120},
			{title: '描述',field: 'remark',align: 'center'},
			{title: '字典状态',field: 'status_desc',align: 'center'}
		]],
		cellMinWidth: 100,
		skin: 'line',
		toolbar: '#toolbar',
		defaultToolbar: [{
			layEvent: 'refresh',
			icon: 'layui-icon-refresh',
		}, 'filter',  'exports']
	});

	table.on('toolbar(dataTable)', function(obj) {
		if (obj.event === 'batchRemove') {
			tableAction(obj.config.id,'确定要删除这些字典?','{:url('batchRecycle')}');
		}else if (obj.event === 'batchRecovery') {
			tableAction(obj.config.id,'确定要恢复这些字典?','{:url('batchRecycle')}?type=1');
		}else if (obj.event === 'refresh') {
			table.reload('dataTable');
		} 
	});
})
</script>
{/block}
