<script type="text/html" id="dict-type-toolbar">
	<!--<button class="pear-btn pear-btn-primary pear-btn-md" lay-event="add"><i class="layui-icon layui-icon-add-1"></i>创建文件夹</button>-->
</script>
<script type="text/html" id="dict-type-bar">
	<button class="pear-btn pear-btn-primary pear-btn-xs" lay-event="details">浏览</button>
	<button class="pear-btn pear-btn-danger pear-btn-xs" lay-event="remove">删除</button>
</script>
<script type="text/html" id="dict-data-toolbar">
	<button class="pear-btn pear-btn-primary pear-btn-sm" lay-event="addPhoto"><i class="layui-icon layui-icon-add-1"></i>新增单文件</button>
	<button class="pear-btn pear-btn-primary pear-btn-sm" lay-event="addPhotos"><i class="layui-icon layui-icon-add-1"></i>新增多文件</button>
	<button class="pear-btn pear-btn-danger pear-btn-sm" lay-event="batchRemove"><i class="layui-icon layui-icon-delete"></i>删除</button>
</script>
<script type="text/html" id="options">
	<button class="pear-btn pear-btn-danger pear-btn-xs" lay-event="remove"><i class="layui-icon layui-icon-delete"></i></button>
</script>
{/block}
{block name="script"}
	<script>
		layui.use(['table', 'form', 'jquery'], function() {
			let table = layui.table;
			let form = layui.form;
			let $ = layui.jquery;

			let name;

			let cols = [
				[
					{
						title: '所属目录',
						field: 'name',
						unresize: true,
						align: 'center'
					},
					{
						title: '操作',
						toolbar: '#dict-type-bar',
						align: 'center',
						unresize: true,
						width: 180
					}
				]
			];

			table.render({
				elem: '#dict-type-table',
				url:  '{:url('index')}',
				cols: cols,
				cellMinWidth: 100,
				skin: 'line',
				height: 'full-148',
				toolbar: '#dict-type-toolbar',
				defaultToolbar: [{
					title: '刷新',
					layEvent: 'refresh',
					icon: 'layui-icon-refresh',
				}, 'filter']
			});

			let dataCols = [
			[{
                        type: 'checkbox'
                    }, {
                        field: 'id',
                        title: 'ID', 
                        sort: true, 
                        align: 'center',
                        unresize: true
                    },{
                        field: 'name',
                        title: '文件名称',
                        unresize: true,
                        align: 'center'
                    },{
                        field: 'link',
                        title: '文件',
                        unresize: true,
                        align: 'center',
                        templet:function (d) {
                            return '<div ><img onerror="imgError(this)" class="photo" lay-event="photo" data-href=" '+d.link+'" src=" '+d.link+'"></div>';
                        }
                    },{
                        field: 'mime',
                        title: 'mime类型',
                        unresize: true,
                        align: 'center'
                    },{
                        field: 'size',
                        title: '文件大小',
                        unresize: true,
                        align: 'center'
                    },{
                        field: 'ext',
                        title: '文件后缀',
                        unresize: true,
                        align: 'center'
                    },{
                        field: 'create_time',
                        title: '创建时间',
                        unresize: true,
						width: 170,
                        align: 'center'
                    },{
                        title: '操作',
                        toolbar: '#options',
                        unresize: true,
                        align: 'center',
                        width: 100
                    }
                ]
			];
			
			window.imgError = function(obj){
				$(obj).parent().html('<a target="_blank" href="'+$(obj).attr('src')+'">下载</a>')
			}
			
			window.renderData = function(code) {
				name = code;
                $(".empty").hide();
				table.render({
					elem: '#dict-data-table',
					url: '{:url('list')}' + '?path=' + name,
					height: 'full-148',
					cols: dataCols,
					cellMinWidth: 100,
					page: true,
					skin: 'line',
					toolbar: '#dict-data-toolbar',
					defaultToolbar: [{
					title: '刷新',
					layEvent: 'refresh',
					icon: 'layui-icon-refresh',
				}, 'filter']
				});
			}

			table.on('tool(dict-type-table)', function(obj) {
				if (obj.event === 'remove') {
					layerConfirm('一旦删除不可恢复?','{:url('del')}',{name:obj.data.name},function(res){
						location.reload();
					})
				} else if (obj.event === 'details') {
					window.renderData(obj.data['name'])
				}
			});

			table.on('toolbar(dict-type-table)', function(obj) {
				if (obj.event === 'add') {
					openLayer('创建文件夹','{:url('add')}','80%','90%');
				} else if (obj.event === 'refresh') {
					table.reload('dict-type-table');
				}
			});

            table.on('tool(dict-data-table)', function(obj) {
                if (obj.event === 'remove') {
					layerConfirm('确定要删除该图片?','{:url('remove')}',{id:obj.data['id']},function(res){
						obj.del();
					})
                } else if (obj.event === 'photo') {
                    window.layerPhotos(obj.data.href);
                } 
            });

            table.on('toolbar(dict-data-table)', function(obj) {
                if (obj.event === 'addPhoto') {  
					openLayer('新增单文件','{:url('addPhoto')}' + '?name=' + name,'80%','90%',function () {
						table.reload('dict-data-table');
					});
                } else if (obj.event === 'addPhotos') {
					openLayer('新增多文件','{:url('addPhotos')}' + '?name=' + name,'80%','90%',function () {
						table.reload('dict-data-table');
					});
                } else if (obj.event === 'refresh') {
					table.reload('dict-data-table');
                } else if (obj.event === 'batchRemove') {
					tableAction(obj.config.id,'确定要删除这些图片?','{:url('batchRemove')}');
                }
            });

        })
	</script>
{/block}
