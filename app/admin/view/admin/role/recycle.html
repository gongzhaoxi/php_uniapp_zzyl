{extend name="base" /}
{block name="body"}
	<div class="layui-card">
		<div class="layui-card-body">
			<table id="dataTable" lay-filter="dataTable"></table>
		</div>
	</div>
	<script type="text/html" id="toolbar">
		<button class="pear-btn pear-btn-primary pear-btn-sm" lay-event="batchRecovery"><i class="layui-icon layui-icon-refresh"></i>恢复数据</button>
		<button class="pear-btn pear-btn-danger pear-btn-sm" lay-event="batchRemove"><i class="layui-icon layui-icon-delete"></i>彻底删除</button>
	</script>
{/block}
{block name="script"}
<script>
layui.use(['table', 'form', 'jquery'], function() {
	let table = layui.table;
	let form = layui.form;
	let $ = layui.jquery;

	let cols = [
		[{
				type: 'checkbox'
			},{
				field: 'id',
				title: 'ID', 
				sort: true, 
				align: 'center',
				unresize: true,
				width: 80
			},{
				field: 'name',
				title: '角色名称',
				unresize: true,
				align: 'center'
			},{
				field: 'desc',
				title: '描述',
				unresize: true,
				align: 'center',
			},{
				field: 'create_time',
				title: '创建时间',
				unresize: true,
				align: 'center'
			},{
				field: 'update_time',
				title: '更新时间',
				unresize: true,
				align: 'center'
			},{
				field: 'delete_time',
				title: '删除时间',
				unresize: true,
				align: 'center'
			}
		]
	]

	table.render({
		elem: '#dataTable',
		url: '{:url('recycle')}',
		page: true,
		cols: cols,
		cellMinWidth: 100,
		skin: 'line',
		toolbar: '#toolbar',
		defaultToolbar: [{
			layEvent: 'refresh',
			icon: 'layui-icon-refresh',
		}, 'filter', 'print', 'exports']
	});

	table.on('toolbar(dataTable)', function(obj) {
		if (obj.event === 'batchRemove') {
			tableAction(obj.config.id,'确定要删除这些角色?','{:url('recycle')}');
		}else if (obj.event === 'batchRecovery') {
			tableAction(obj.config.id,'确定要恢复这些角色?','{:url('recycle')}?type=1');
		}else if (obj.event === 'refresh') {
			table.reload('dataTable');
		} 
	});
})
</script>
{/block}
