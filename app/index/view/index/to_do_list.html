{extend name="base" /}
{block name="body"}
<div class="layui-card">
	<div class="layui-card-body">
		<table id="dataTable" lay-filter="dataTable"></table>
	</div>
</div>
<script type="text/html" id="toolbar">
	<button class="pear-btn pear-btn-danger pear-btn-sm" lay-event="batchRemove"><i class="layui-icon layui-icon-delete"></i>删除</button>
</script>
<script type="text/html" id="options">
	<button class="pear-btn pear-btn-primary pear-btn-xs" lay-event="edit">查看</button>
	<!--<button class="pear-btn pear-btn-danger pear-btn-xs" lay-event="remove"><i class="layui-icon layui-icon-delete"></i></button>-->
</script>
{/block}
{block name="script"}
<script>
	layui.use(['table', 'form', 'jquery','common'], function() {
		let table = layui.table;
		let form = layui.form;
		let $ = layui.jquery;

		table.render({
			elem: '#dataTable',
			url: '{:url('toDoList')}',
			page: false,
			limit:10000,
			height:'full-170',
			cols: [[
				//{type: 'checkbox'},
				{field: 'type',title: '待办类型',align: 'center',width: {:get_col_width('type',180)}},
				{field: 'remark',title: '不合格描述',align: 'left',width: {:get_col_width('remark')}},
				{field: 'username',title: '发起人',align: 'center',width: {:get_col_width('username',120)}},
				{field: 'create_time',title: '发起时间',align: 'center',width: {:get_col_width('create_time',170)}},
				{title: '操作',toolbar: '#options',align: 'center',width: 80,unresize:true}
			]],
			cellMinWidth: 100,
			//skin: 'line',
			toolbar: false,
			defaultToolbar: [{
				title: '刷新',
				layEvent: 'refresh',
				icon: 'layui-icon-refresh',
			}, 'filter']
		});

		table.on('sort(dataTable)', function(obj){
			table.reload('dataTable', {
				initSort: obj,
				where: {
					sort: obj.field,
					order: obj.type
				}
			},true);
		});

		table.on('tool(dataTable)', function(obj) {
			if (obj.event === 'remove') {
				layerConfirm('确定要删除该客户?','{:url('remove')}',{ids:[obj.data['id']]},function(res){
					obj.del();
				})
			} else if (obj.event === 'edit') {
				if(obj.data['from'] == 1){
					openLayer('详情','{:url('ErpOrderProduce/reworkEdit')}?id='+obj.data['id'],'90%','90%');
				}else if(obj.data['from'] == 2){
					openLayer('详情','{:url('ErpMaterialWarehouse/returnCheck')}?id='+obj.data['id'],'90%','90%');
				}else if(obj.data['from'] == 3){
					openLayer('详情','{:url('ErpOrderProduce/processFinish')}?produce_sn='+obj.data['produce_sn']+'&process_id='+obj.data['process_id'],'90%','90%');
				}else if(obj.data['from'] == 4){
					openLayer('详情','{:url('ErpMaterialWarehouse/backAdd')}?id='+obj.data['id'],'90%','90%');
				}else if(obj.data['from'] == 5){
					openLayer('详情','{:url('ErpMaterialWarehouse/scrap')}?id='+obj.data['id'],'90%','90%');
				}
				
			}
		});

		table.on('toolbar(dataTable)', function(obj) {
			if (obj.event === 'refresh') {
				table.reload('dataTable');
			} else if (obj.event === 'batchRemove') {
				tableAction(obj.config.id,'确定要删除这些客户','{:url('remove')}');
			}
		});

		form.on('submit(query)', function(data) {
			table.reload('dataTable', {
				where: data.field,
				page:{curr: 1}
			})
			return false;
		});
		
		table.on('colResized(dataTable)', function(obj){
			$.ajax({
				type : "post",
				url : "{:url('Common/setColWidth')}",
				data: {field:obj.col.field,width:obj.col.width,path:'{:request()->baseUrl()}'},
				success : function(data) {
	
				}
			});
		});
		
	})
</script>
{/block}
