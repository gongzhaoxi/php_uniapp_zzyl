{extend name="layout" /}
{block name="body"}
<style>
.layui-table-cell { height:auto;}
.bom{margin:10px;font-size:12px;line-height:30px;}
.bom .title{font-weight:600;font-size:13px;}
.more{color: rgb(24, 144, 255);font-size:12px;}
.error-img{max-width:100px;max-height:100px;margin-right:10px;}
.confirm-time{color: rgb(24, 144, 255);}
</style>
<div class="layui-card">
	<div class="layui-card-body">
		<!--
		<div class="layui-tab layui-tab-brief">
			<ul class="layui-tab-title">
				<a href="{:url('list')}"><li class="layui-this">销售订单</li></a>
				<a href="{:url('aftersale')}"><li>售后订单</li></a>
			</ul>
		</div>	-->
		
			<form class="layui-form" action="" id="searchForm">
				<div class="layui-form-item">
					<div class="layui-form-item layui-inline">
						<input type="text" name="customer_name" placeholder="客户名称/订货单位" class="layui-input">					
					</div>	
					<div class="layui-form-item layui-inline">
						<input type="text" name="order_sn" placeholder="销售合同号" class="layui-input">	
					</div>	
					<div class="layui-form-item layui-inline">
						<input type="text" name="produce_sn" placeholder="产品编码" class="layui-input">	
					</div>	
					<div class="layui-form-item layui-inline">
						<select name="region_type">
							<option value="">订单属性</option>
							{foreach $region_type as $key=>$vo}
							<option value="{$key}">{$vo}</option>
							{/foreach}
						</select>
					</div>
					<div class="layui-form-item layui-inline">
						<input type="text" name="shipping_sn" placeholder="发货单号" class="layui-input">	
					</div>				
					<div class="layui-form-item layui-inline">
						<button class="layui-btn layui-btn-md" lay-submit lay-filter="query"><i class="layui-icon layui-icon-search"></i>查询</button>

					</div>
				</div>
			</form>
<table id="dataTable" lay-filter="dataTable"></table>
	</div>
</div>

<script type="text/html" id="toolbar">
	<button class="layui-btn layui-btn-sm  layui-bg-blue" lay-event="confirm"><i class="layui-icon layui-icon-release"></i>确认出库</button>
</script>
<script type="text/html" id="options">
	<div class="layui-btn-group">
		 {{#  if(d.can_cancel){ }}<button class="layui-btn layui-btn-xs layui-btn-danger" lay-event="cancel">撤销通知</button>{{#  } }} 
		 {{#  if(d.can_confirm){ }}<button class="layui-btn layui-btn-xs" lay-event="confirm">确认出库</button>{{#  } }} 
	</div>
</script>

<script type="text/html" id="bom">
	<button class="layui-btn layui-btn-primary layui-border-blue layui-btn-xs" lay-event="bom">查看</button>
</script>

{/block}
{block name="script"}
<script>
	var check_ids = [];
	layui.use(['table', 'form', 'jquery','common'], function() {
		let table = layui.table;
		let form = layui.form;
		let $ = layui.jquery;

		table.render({
			elem: '#dataTable',
			url: '{:url('index')}',
			page: true,
			size:'sm',
			cols: [[
				{type: 'checkbox'},
				{field: 'shipping_sn',title: '发货单号',align: 'center',unresize: false,width: {:get_col_width('shipping_sn',140)}},
				{field: 'region_type_desc',title: '订单性质',align: 'center',unresize: false,width: {:get_col_width('region_type_desc',100)}},
				{field: 'order_sn',title: '销售合同号',align: 'center',unresize: false,width: {:get_col_width('order_sn',140)}},
				{field: 'customer_name',title: '客户名称/订货单位',align: 'center',unresize: false,width: {:get_col_width('customer_name')}},
				{field: 'address',title: '地址',align: 'center',unresize: false,width:{:get_col_width('address')}},
				{field: 'contacts',title: '联系人',align: 'center',unresize: false,width: {:get_col_width('contacts',80)}},
				{field: 'model',title: '型号',align: 'center',unresize: false,width: {:get_col_width('model',100)}, templet: function(d){return d.order_product?d.order_product.product_model:'';}},
				{field: 'queue_num',title: '数量',align: 'center',unresize: false,width: {:get_col_width('num',80)}, templet: function(d){return d.queue_num+'/'+(d.order_product?d.order_product.product_num:'');}},
				{field: 'produce_sn',title: '产品编号',align: 'center',unresize: false,width: {:get_col_width('produce_sn',190)}},
				{field: 'bom',title: '具体配置',align: 'center',unresize: false,width: {:get_col_width('bom',100)}, templet:'#bom'},
			]],
			cellMinWidth: 80,
			//skin: 'line',
			toolbar: '#toolbar',
			done: function(res, curr, count){
                    // 解决操作栏因为内容过多换行问题
                    $(".layui-table-main tr").each(function (index, val) {
                        $($(".layui-table-fixed-l .layui-table-body tbody tr")[index]).height($(val).height());
                        $($(".layui-table-fixed-r .layui-table-body tbody tr")[index]).height($(val).height());
                    });
			},
			parseData: function(res){
				for(var i in res.data) {
					if(check_ids.length > 0 && check_ids.indexOf(res.data[i]['id']) != -1){
						res.data[i]['LAY_CHECKED'] = true;
					}
				}
				return res;
			},
			defaultToolbar: [{
				title: '刷新',
				layEvent: 'refresh',
				icon: 'layui-icon-refresh',
			}, 'filter']
		});

		table.on('sort(dataTable)', function(obj){
			table.reload('dataTable', {
				initSort: obj,
				where: {
					sort: obj.field,
					order: obj.type
				}
			},true);
		});

		table.on('tool(dataTable)', function(obj) {
			if (obj.event === 'bom') {
				layer.open({
					type: 1, 
					area: ['500px', '300px'],
					content: '<div class="bom">'+obj.data.order_product.project_html+'</div>'
				});
			}
		});

		table.on('toolbar(dataTable)', function(obj) {
			if (obj.event === 'refresh') {
				table.reload('dataTable');
			}else if (obj.event === 'confirm') {
				var checkStatus = table.checkStatus('dataTable');
				if(checkStatus.data.length == 0){
					layer.msg('请选择要操作的内容');
					return false;
				}
				var shipping_sn = ''			
				for(var i in checkStatus.data) {
					if(shipping_sn == ''){
						shipping_sn = checkStatus.data[i].shipping_sn
					}else if(shipping_sn != checkStatus.data[i].shipping_sn){
						layer.msg('出库单号必须相同');
						return false;
					}
				}
				if(shipping_sn == ''){
					layer.msg('请选择有出库单号的数据');
					return false;
				}	
				openLayer('确认出库','{:url('confirm')}?shipping_sn='+shipping_sn,'80%','90%');
			}
		});

		form.on('submit(query)', function(data) {
			table.reload('dataTable', {
				where: data.field,
				page:{curr: 1}
			})
			return false;
		});
		

	})
</script>
{/block}
