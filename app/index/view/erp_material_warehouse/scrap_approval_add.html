{extend name="base" /}
{block name="body"}
<style>
.layui-input-block {margin-left: 150px;}
.layui-form-label {width: 120px;}
</style>
<form class="layui-form" action="" method="post" data-reload="1" data-callback="submitCallBack">
	<input type="hidden"  name="order_id" id="order_id"  value="">
	<div class="mainBox">
		<div class="main-container">
			<button type="button" class="layui-btn edit  layui-hide">批量修改信息</button>
			<div class="layui-form-item layui-hide">
				<div class="layui-row">				
					<div class="layui-col-md3">
						<label class="layui-form-label">不良品原因</label>
						<div class="layui-input-block">
							<select id="cid" lay-verify="required" lay-filter="type">
								{foreach $material_scrap_type as $key=>$vo}
								<option value="{$vo['id']}" >{$vo['name']}</option>
								{/foreach}
							</select>
						</div>
					</div>
					<div class="layui-col-md3">
						<label class="layui-form-label">不良品日期</label>
						<div class="layui-input-block">
							<input type="text"  readonly id="stock_date" value="{:date('Y-m-d')}" lay-verify="required" placeholder="请选择,不可为空" autocomplete="off" class="layui-input date">
						</div>	
					</div>
					<div class="layui-col-md12" style="margin-top:10px;">
						<label class="layui-form-label">不良品原因</label>
						<div class="layui-input-block">
							<input type="text" maxlength="255" id="remark"   placeholder="请输入" autocomplete="off" class="layui-input remark">
						</div>	
					</div>					
				</div>
			</div>			
			<blockquote class="layui-elem-quote  layui-hide">相关物料信息</blockquote>
			<div class="layui-row layui-col-space10 layui-hide">
				<div class="layui-col-md11">
					<select id="selectId"  xm-select="selectId" xm-select-radio  xm-select-search=""></select>
				</div>
				<div class="layui-col-md1">
					<button type="button" class="layui-btn showSearch">高级筛选</button>
				</div>
			</div>
			<table class="layui-table">
				<thead>
					<tr>
						<th>物料编码</th>
						<th>物料名称</th>
						<th>库存数量</th>
						<th>不良品量</th>
						<th>不良品来源</th>
						<th>不良品日期</th>
						<th>不良品原因</th>
						<th>操作</th>
					</tr> 
				</thead>
				<tbody id="tbody">
					{foreach $data as $vo}
						<tr id="material_{$vo['id']}"><input type="hidden"  name="material[{$vo['id']}][id]" value="{$vo['id']}" >
							<td>{$vo['sn']}</td>
							<td>{$vo['name']}</td>
							<td class="stock">{$vo['stock']}</td>
							<td><input type="text" data-old="0"  name="material[{$vo['id']}][stock_num]" value="" class="layui-input stock_num" data-key="stock_num" lay-verify="required|number" placeholder="请输入数量"></td>
							<td>
								<select name="material[{$vo['id']}][cid]" class="cid" required lay-verify="required">
									{foreach $material_scrap_type as $v}
									<option value="{$v['id']}" >{$v['name']}</option>
									{/foreach}
								</select>
							</td>
							<td><input type="text"  name="material[{$vo['id']}][stock_date]" value="{:date('Y-m-d')}" class="layui-input date stock_date" data-key="stock_date" placeholder=""></td>
							<td><input type="text"  name="material[{$vo['id']}][remark]" value="" class="layui-input remark" data-key="remark" placeholder=""></td>
							<td><button type="button" onclick="deleteMaterial({$vo['id']})" class="layui-btn layui-btn-xs layui-btn-danger">删除</button></td>
						</tr>
					{/foreach}
				</tbody>
			</table>
		</div>
	</div>
	<div class="bottom">
		<div class="button-container">
			<button type="submit" class="layui-btn layui-btn-normal layui-btn-sm" lay-submit="" lay-filter="*"><i class="layui-icon layui-icon-ok"></i>提交</button>
		</div>
	</div>
</form>
{/block}
{block name="script"}
<script>
var material_scrap_type = {:json_encode($material_scrap_type)}

layui.use(['tableSelect','form','select'], function () {
	var $ = layui.jquery;
	var tableSelect = layui.tableSelect,form = layui.form;

	window.submitCallBack = function (res){
		location.replace('{:url('edit')}?id='+res.data.id);
	}
	
	window.deleteMaterial = function(_id){
		$('#material_'+_id).remove();	
	}
	
	$("body").on("change",".stock_num",function(){
		var value 	= $(this).val();
		var old 	= $(this).data('old');
		var num 	= parseInt($(this).closest('tr').find('.stock').html());
		//value 		= value.replace(/[^\d]/g,"");
		if(!(/^([1-9][0-9]*)$/.test(value)) || value <= 0){ 
			layer.msg('请输入大于0的正整数');
			$(this).val(old);
			return ;
		}
		value = parseInt(value);
		if(value > num){
			layer.msg('最多不良品量'+num);
			$(this).val(old);
			return ;
		}
		$(this).data('old',value);
	});
	
	$(".layui-table").on("keydown",".layui-input",function(){
		if (event.keyCode == 40) {
			$(this).closest('tr').next().find('.'+$(this).data('key')).focus();
		}else if (event.keyCode == 38) {
			$(this).closest('tr').prev().find('.'+$(this).data('key')).focus();
		}else if (event.keyCode == 13 || event.keyCode == 39) {
			//右一个
			$(this).closest('td').next().find('.layui-input').focus();
		}else if (event.keyCode == 37) {
			//左一个
			$(this).closest('td').prev().find('.layui-input').focus();
		}
	});	
	
});
</script>
{/block}
